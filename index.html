// ドーナツ（完了率）
function Donut({ pct, size = 96, stroke = 11, color = '#2ec4b6' }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.max(0, Math.min(1, pct / 100)));
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#222d52" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: 'stroke-dashoffset .6s' }} />
      <text x="50%" y="50%" textAnchor="middle" dominantBaseline="central" fill="#e2e8f0" fontSize={size * 0.24} fontWeight="900">{Math.round(pct)}%</text>
    </svg>
  );
}

const QUIPS = [

function quipOf(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0;
  return QUIPS[Math.abs(h) % QUIPS.length];
}

/* =========================================================================
 *  日付ヘルパー（YYYYMMDD 文字列ベース・TZずれ回避）
 * ========================================================================= */
const pad2 = (n) => String(n).padStart(2, '0');
const toYmd = (y, m, d) => `${y}${pad2(m)}${pad2(d)}`;
const parseYmd = (s) => ({ y: +s.slice(0, 4), m: +s.slice(4, 6), d: +s.slice(6, 8) });
const dowOf = (y, m, d) => new Date(y, m - 1, d).getDay(); // 0=日
const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
const WEEK_JP = ['日', '月', '火', '水', '木', '金', '土'];

function isSummer(m, d) {
  return (m === 7 && d >= 21) || m === 8; // 7/21〜8/31
}

// 振替休日：日曜が祝日なら翌月曜を休みに（範囲内の簡易対応）
function isSubstituteHoliday(s) {
  const { y, m, d } = parseYmd(s);
  if (dowOf(y, m, d) !== 1) return false; // 月曜のみ
  const prev = new Date(y, m - 1, d - 1);
  const ps = toYmd(prev.getFullYear(), prev.getMonth() + 1, prev.getDate());
  return HOLIDAYS.has(ps) && new Date(y, m - 1, d - 1).getDay() === 0;
}
function isHolidayDate(s) {
  return HOLIDAYS.has(s) || isSubstituteHoliday(s);
}

// その日の区分・目標時間・時限数（指示書 §4-1 §4-2 §8）
function dayInfo(s) {
  const { y, m, d } = parseYmd(s);
  const dow = dowOf(y, m, d);
  const weekend = dow === 0 || dow === 6;
  const holiday = isHolidayDate(s);
  if (isSummer(m, d)) return { mode: '夏休み', targetH: 10, slots: 10, rest: true, dow };
  if (weekend || holiday) return { mode: '休日', targetH: 10, slots: 10, rest: true, dow };
  if (dow === 1) return { mode: '月曜', targetH: 5.5, slots: 5, rest: false, dow };
  return { mode: '平日', targetH: 4, slots: 5, rest: false, dow };
}

function todayYmd() {
  const n = new Date();
  return toYmd(n.getFullYear(), n.getMonth() + 1, n.getDate());
}

function slotFromMenu(i, subject, menu) {
  return {
    slotNumber: i + 1,
    subject,
    menu,
    material: '',
    minutes: menuMin(subject, menu),
    done: false,
    note: '',
  };
}
function slotsFromArr(arr) {
  return (arr || []).map((x, i) => slotFromMenu(i, x.subject, x.menu));
}
function buildSlotsFromSet(name) {
  return slotsFromArr(SET_MENUS[name]);
}
// SET_MENUS（定数）を編集可能なデータ形へ深いコピー
function cloneSetMenus() {
  const out = {};
  Object.keys(SET_MENUS).forEach((n) => { out[n] = SET_MENUS[n].map((x) => ({ subject: x.subject, menu: x.menu })); });

}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seedData();
    const obj = JSON.parse(raw);
    // 旧データの後方互換
    if (!obj.events) obj.events = {};
    if (!obj.settings) obj.settings = { activeSetMenu: '通常（平日）' };
    if (!obj.dailyLogs) obj.dailyLogs = {};
    if (!obj.setMenus) obj.setMenus = cloneSetMenus();
    if (!obj.finalActual) obj.finalActual = {};
    return obj;
  } catch (e) {
    return seedData();
  }
}

// その日の予定ラベル（events マップ ＋ dailyLogs.events 両方を統合）
function eventsOf(data, s) {
  const a = (data.events && data.events[s]) || [];
  const b = (data.dailyLogs[s] && data.dailyLogs[s].events) || [];
  return [...a, ...b];
}
function logOf(data, s) {
  return data.dailyLogs[s] || { slots: [], memo: '', events: [] };
}
// 実績分：完了コマは actualMin（記録があれば）優先、無ければ予定 minutes
function actualOf(slot) {
  if (!slot.done) return 0;
  const a = slot.actualMin;
  return (a !== undefined && a !== null && a !== '') ? (+a || 0) : (+slot.minutes || 0);
}
function doneMinutes(log) {
  return (log.slots || []).reduce((a, x) => a + actualOf(x), 0);
}
function plannedMinutes(log) {
  return (log.slots || []).reduce((a, x) => a + (+x.minutes || 0), 0);
}

// その日の区分に合うセットメニュー名を選ぶ（#3）
function defaultSetFor(info, setMenus, settings) {
  const names = Object.keys(setMenus || {});
  if (!names.length) return '';
  if (!info.rest) {
    return (settings && settings.activeSetMenu && setMenus[settings.activeSetMenu]) ? settings.activeSetMenu : names[0];
  }
  // 休日・夏休み：コマ数が枠（info.slots）を超えない範囲で最大のセット
  let best = names[0];
  names.forEach((n) => { if (setMenus[n].length > setMenus[best].length && setMenus[n].length <= info.slots) best = n; });
  return best;
}

      const renum = next.map((s, i) => ({ ...s, slotNumber: i + 1 }));
      return {
        ...prev,
        dailyLogs: {

        },
      };
    });
  };
  const setMemo = (v) => setData((prev) => {
    const cur = prev.dailyLogs[date] || { slots: [], memo: '', events: [] };
    return { ...prev, dailyLogs: { ...prev.dailyLogs, [date]: { ...cur, memo: v } } };
  });

  const updateSlot = (i, patch) => setSlots((arr) => arr.map((s, idx) => (idx === i ? { ...s, ...patch } : s)));
  const addSlot = () => setSlots((arr) => [...arr, slotFromMenu(arr.length, '英語', MENU_MASTER['英語'][0].name)]);
  const removeSlot = (i) => setSlots((arr) => arr.filter((_, idx) => idx !== i));
  const move = (i, dir) => setSlots((arr) => {
    const j = i + dir;
    if (j < 0 || j >= arr.length) return arr;
    const copy = [...arr];
    [copy[i], copy[j]] = [copy[j], copy[i]];
    return copy;
  });

  const setMenus = data.setMenus || SET_MENUS;
  const setMenuNames = Object.keys(setMenus);
  const [applyName, setApplyName] = useState(() => defaultSetFor(info, setMenus, data.settings));
  const applySet = () => {
    if (slots.length > 0 && !window.confirm('現在のコマを上書きしてセットメニューを適用しますか？')) return;
    setSlots(slotsFromArr(setMenus[applyName]));
  };
  const appendSet = () => setSlots((arr) => [...arr, ...slotsFromArr(setMenus[applyName])]);

  const done = doneMinutes(log);
  const planned = plannedMinutes(log);
  const goalMin = info.targetH * 60;
  const ratio = goalMin ? done / goalMin : 0;

  return (
    <div className="max-w-2xl mx-auto px-3 pb-40">

                  </div>

                  className="flex-1 min-w-[100px] bg-navy-600/60 rounded-lg px-2 py-1 text-xs outline-none" />
              </div>
            </div>
          );
        })}
      </div>

        <div className="max-w-2xl mx-auto">

        </div>
      </div>
    </div>
  );
}

/* =========================================================================
 *  ヘッダ（エクスポート / インポート）
 * ========================================================================= */
function Header({ title, data, setData }) {
  const fileRef = useRef(null);
  const exportJson = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `study-backup-${todayYmd()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const importJson = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const obj = JSON.parse(r.result);
        if (!obj.dailyLogs) throw new Error('形式が不正です');
        if (!obj.events) obj.events = {};
        if (!obj.settings) obj.settings = { activeSetMenu: '通常（平日）' };
        setData(obj);
        alert('インポートしました');
      } catch (err) {
        alert('読み込みに失敗：' + err.message);
      }
    };
    r.readAsText(f);
    e.target.value = '';
  };
  return (
    <div className="flex items-center justify-between pt-3">
      <div>
        <h1 className="text-xl font-black">📚 {title}</h1>
        <p className="text-[11px] text-slate-400">2026.6 〜 2027.2 受験ロード</p>
      </div>
      <div className="flex gap-1 items-center">
        <button onClick={() => { location.hash = '#/day/' + todayYmd(); window.scrollTo(0, 0); }}
          className="text-xs px-2.5 py-1 rounded-lg bg-teal text-navy font-bold active:bg-teal-600">今日</button>
        <button onClick={exportJson} className="text-xs px-2 py-1 rounded-lg bg-navy-600 active:bg-navy-500">⬇</button>
        <button onClick={() => fileRef.current.click()} className="text-xs px-2 py-1 rounded-lg bg-navy-600 active:bg-navy-500">⬆</button>
        <input ref={fileRef} type="file" accept="application/json" className="hidden" onChange={importJson} />
      </div>
    </div>
  );
}

    const mon = new Date(base); mon.setDate(base.getDate() - monOffset);
    return WEEK_DAYS.map((_, i) => { const d = new Date(mon); d.setDate(mon.getDate() + i); return toYmd(d.getFullYear(), d.getMonth() + 1, d.getDate()); });

}

/* =========================================================================

function GoalsScreen({ data, setData, go }) {
  const finalActual = data.finalActual || {};
  const scores = data.testScores || {};
  const setFinal = (name, v) => setData((prev) => ({ ...prev, finalActual: { ...prev.finalActual, [name]: v } }));
  const setScore = (key, v) => setData((prev) => ({ ...prev, testScores: { ...prev.testScores, [key]: { ...(prev.testScores && prev.testScores[key]), actual: v } } }));

  // 試験ごとにグループ化
  const examGroups = useMemo(() => {
    const g = {};
    TEST_TARGETS.forEach((t) => { (g[t.exam] = g[t.exam] || []).push(t); });
    return g;
  }, []);

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="目標管理" data={data} setData={setData} />
      <NavTabs current="goals" go={go} />

      {/* 最終目標 */}
      <div className="text-xs font-bold text-teal mt-4 mb-1 px-1">🎯 最終目標</div>
      <div className="space-y-1.5 mb-4">
        {FINAL_GOALS.map((g) => (
          <div key={g.name} className="bg-navy-700 rounded-lg px-3 py-2 flex items-center gap-2">
            <span className="flex-1 text-sm font-medium">{g.name}</span>
            <span className="text-xs text-slate-400">目標 {g.target}</span>
            <input value={finalActual[g.name] || ''} onChange={(e) => setFinal(g.name, e.target.value)}
              placeholder="現在" className="w-20 bg-navy-600 rounded px-2 py-1 text-xs text-right outline-none" />
          </div>
        ))}
      </div>

      {/* テスト目標点 */}
      <div className="text-xs font-bold text-teal mb-1 px-1">📝 テスト目標点・実績</div>
      <div className="space-y-3 mb-4">
        {Object.keys(examGroups).map((exam) => (
          <div key={exam} className="bg-navy-700 rounded-xl overflow-hidden">

              <thead>
                <tr className="text-slate-400">
                  <th className="text-left px-3 py-1">科目</th>
                  <th className="px-2 py-1 w-16">目標</th>
                  <th className="px-2 py-1 w-20">実績</th>
                  <th className="px-2 py-1 w-12">達成</th>
                </tr>
              </thead>
              <tbody>
                {examGroups[exam].map((t) => {
                  const key = t.exam + '_' + t.subject;
                  const actual = (scores[key] && scores[key].actual) || '';

                  const hasNum = !isNaN(num);
                  const achieved = hasNum && num >= t.target;
                  return (
                    <tr key={key} className="border-t border-navy-600">
                      <td className="px-3 py-1.5">{t.subject}</td>
                      <td className="px-2 py-1.5 text-center tabnum text-slate-300">{t.target}</td>

                      <td className="px-2 py-1.5 text-center">{actual === '' ? <span className="text-slate-600">-</span> : !hasNum ? <span className="text-slate-500">—</span> : achieved ? '✅' : '❌'}</td>

            <div className="overflow-x-auto">
              <table className="w-full text-[11px]">
                <thead>
                  <tr className="text-slate-400">
                    <th className="text-left px-2 py-1">項目</th>
                    <th className="px-1 py-1">6月</th>
                    <th className="px-1 py-1">7月</th>
                    <th className="px-1 py-1">8月</th>
                    <th className="text-left px-2 py-1">到達目標</th>

                </thead>
                <tbody>
                  {g.rows.map((r, i) => (
                    <tr key={i} className="border-t border-navy-600 align-top">
                      <td className="px-2 py-1 font-medium whitespace-nowrap">{r.item}</td>
                      <td className="px-1 py-1 text-center text-slate-300">{r.m6 || '·'}</td>

        ))}

  );

/* =========================================================================
 *  英語 進捗管理画面（指示書 §4-4）
 * ========================================================================= */
function EnglishScreen({ data, setData, go }) {
  const [open, setOpen] = useState({}); // material.key -> true で展開（既定折りたたみ）
  const prog = data.englishProgress || {};
  const get = (id) => prog[id] || { status: '未着手', date: null, minutes: 0, score: '', note: '' };

  const update = (id, patch) => setData((prev) => {
    const cur = (prev.englishProgress && prev.englishProgress[id]) || { status: '未着手', date: null, minutes: 0, score: '', note: '' };
    const next = { ...cur, ...patch };
    // 状態を「未着手→着手」に変えたら実施日を今日に
    if (patch.status !== undefined && patch.status !== '未着手' && !cur.date) next.date = todayYmd();
    return { ...prev, englishProgress: { ...prev.englishProgress, [id]: next } };
  });

  const doneOf = (id) => get(id).status !== '未着手';
  const matStat = (mat) => {
    const done = mat.units.filter((u) => doneOf(u.id)).length;
    return { done, total: mat.units.length };
  };

  const overall = useMemo(() => {
    const total = ALL_ENGLISH_UNITS.length;
    const done = ALL_ENGLISH_UNITS.filter((u) => doneOf(u.id)).length;
    const full = ALL_ENGLISH_UNITS.filter((u) => get(u.id).status === '2周目完了').length;
    return { total, done, full, pct: total ? (done / total) * 100 : 0 };
  }, [prog]);

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="英語 進捗" data={data} setData={setData} />
      <NavTabs current="english" go={go} />

      {/* 全体サマリー（ドーナツ＋カテゴリ別） */}
      <div className="bg-navy-700 rounded-xl p-4 my-3 flex items-center gap-4">
        <Donut pct={overall.pct} />
        <div className="flex-1">
          <div className="text-sm">教材 完了率</div>
          <div className="text-xs text-slate-400 mt-1">着手済み <span className="text-teal font-bold tabnum">{overall.done}</span> / {overall.total} 単元</div>
          <div className="text-xs text-slate-400">うち2周目完了 <span className="text-blue-300 font-bold tabnum">{overall.full}</span></div>
        </div>
      </div>

      {/* カテゴリ別 完了数一覧 */}
      <div className="grid grid-cols-2 gap-1.5 mb-3">
        {ENGLISH_GROUPS.flatMap((g) => g.materials).map((mat) => {
          const { done, total } = matStat(mat);
          return (
            <div key={mat.key} className="bg-navy-700 rounded-lg px-2.5 py-1.5">
              <div className="flex items-center justify-between text-[11px]">
                <span className="truncate">{mat.name}</span>
                <span className="tabnum text-slate-400">{done}/{total}</span>
              </div>
              <ProgressBar ratio={total ? done / total : 0} height={4} />
            </div>
          );
        })}
      </div>

      {/* 教材ごと（グループ見出し→教材カード） */}
      {ENGLISH_GROUPS.map((g) => (
        <div key={g.group} className="mb-3">
          <div className="text-xs font-bold text-teal mb-1 px-1">{g.group}</div>
          <div className="space-y-2">
            {g.materials.map((mat) => {
              const { done, total } = matStat(mat);
              const isOpen = !!open[mat.key];
              return (
                <div key={mat.key} className="rounded-xl bg-navy-700 overflow-hidden">
                  <button onClick={() => setOpen((o) => ({ ...o, [mat.key]: !o[mat.key] }))}
                    className="w-full flex items-center gap-2 px-3 py-2.5 text-left active:bg-navy-600">
                    <span className="text-xs text-slate-400" style={{ transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▶</span>
                    <span className="flex-1 text-sm font-medium">{mat.name}</span>
                    <span className="tabnum text-xs text-slate-400">{done}/{total}</span>
                    <div className="w-16"><ProgressBar ratio={total ? done / total : 0} height={5} /></div>
                  </button>
                  {isOpen && (
                    <div className="px-2 pb-2 space-y-1.5">
                      {mat.units.map((u) => {
                        const p = get(u.id);
                        const col = p.status === '2周目完了' ? '#3b82f6' : p.status === '1周目完了' ? '#22c55e' : '#475569';
                        return (
                          <div key={u.id} className="rounded-lg bg-navy-600 p-2.5" style={{ borderLeft: `4px solid ${col}` }}>
                            <div className="flex items-center gap-2">
                              <span className="flex-1 text-sm">{u.label}</span>
                              <select value={p.status} onChange={(e) => update(u.id, { status: e.target.value })}
                                className="bg-navy-700 rounded px-1.5 py-1 text-[11px] outline-none">
                                {ENGLISH_STATUS.map((s) => <option key={s} value={s}>{s}</option>)}
                              </select>
                            </div>
                            <div className="flex flex-wrap items-center gap-1.5 mt-2">
                              <div className="flex items-center bg-navy-700 rounded px-1.5">
                                <input type="number" min="0" step="5" value={p.minutes || 0}
                                  onChange={(e) => update(u.id, { minutes: +e.target.value })}
                                  className="w-12 bg-transparent text-right text-[11px] outline-none tabnum" />
                                <span className="text-[10px] text-slate-400 ml-0.5">分</span>
                              </div>
                              <input value={p.score || ''} onChange={(e) => update(u.id, { score: e.target.value })}
                                placeholder="得点・正答率" className="w-24 bg-navy-700 rounded px-1.5 py-1 text-[11px] outline-none" />
                              {p.date && <span className="text-[10px] text-slate-500">実施 {(() => { const d = parseYmd(p.date); return `${d.m}/${d.d}`; })()}</span>}
                              <input value={p.note || ''} onChange={(e) => update(u.id, { note: e.target.value })}
                                placeholder="メモ" className="flex-1 min-w-[80px] bg-navy-700/60 rounded px-1.5 py-1 text-[11px] outline-none" />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* =========================================================================
 *  世界史 進捗管理画面（指示書 §4-5）
 * ========================================================================= */
function HistoryScreen({ data, setData, go }) {
  const [open, setOpen] = useState({}); // chapter -> true で展開（既定は折りたたみ）
  const [filterTarget, setFilterTarget] = useState(false); // 80%未満のみ表示

  const prog = data.historyProgress || {};
  const get = (no) => prog[no] || { mastery: 0, status: '未着手', lastDate: null, usedMaterials: [], note: '' };

  const update = (no, patch) => setData((prev) => {
    const cur = (prev.historyProgress && prev.historyProgress[no]) || { mastery: 0, status: '未着手', lastDate: null, usedMaterials: [], note: '' };
    const next = { ...cur, ...patch };
    // 習熟度を動かしたら最終学習日を今日に
    if (patch.mastery !== undefined && patch.mastery !== cur.mastery) {
      next.lastDate = todayYmd();
      // 80%以上に到達したら状態を「定着」へ自動更新（手動変更は尊重し、引き上げのみ #8）
      if (next.mastery >= 80 && cur.status !== '定着' && patch.status === undefined) next.status = '定着';
    }
    return { ...prev, historyProgress: { ...prev.historyProgress, [no]: next } };
  });
  const toggleMaterial = (no, mat) => {
    const cur = get(no);
    const has = cur.usedMaterials.includes(mat);
    update(no, { usedMaterials: has ? cur.usedMaterials.filter((x) => x !== mat) : [...cur.usedMaterials, mat] });
  };

  // 全体サマリー
  const overall = useMemo(() => {
    const ms = HISTORY_UNITS.map((u) => get(u.no).mastery || 0);
    const avg = ms.reduce((a, b) => a + b, 0) / ms.length;
    const settled = ms.filter((m) => m >= 80).length;
    return { avg, settled };
  }, [prog]);

  const chapters = Object.keys(HISTORY_CHAPTERS).map(Number);

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="世界史 進捗" data={data} setData={setData} />
      <NavTabs current="history" go={go} />

      {/* 全体サマリー */}
      <div className="bg-navy-700 rounded-xl px-4 py-3 my-3">
        <div className="flex items-center justify-between text-sm mb-1">
          <span>全88単元の平均定着度 <span className="font-black tabnum" style={{ color: masteryColor(overall.avg) }}>{Math.round(overall.avg)}%</span></span>
          <span className="text-slate-400 text-xs">80%以上：<span className="text-teal font-bold">{overall.settled}</span>/88</span>
        </div>
        <ProgressBar ratio={overall.avg / 100} />
      </div>

      {/* フィルター */}
      <div className="flex items-center gap-2 mb-2">
        <button onClick={() => setFilterTarget((v) => !v)}
          className={'text-xs px-3 py-1.5 rounded-full border ' + (filterTarget ? 'bg-amber-500/20 border-amber-400/50 text-amber-200' : 'bg-navy-700 border-navy-600 text-slate-300')}>
          🎯 7月末までに80%にしたい単元（80%未満）
        </button>
        <div className="flex-1" />
        <button onClick={() => setOpen(Object.fromEntries(chapters.map((c) => [c, true])))} className="text-xs text-slate-400 px-2">全展開</button>
        <button onClick={() => setOpen({})} className="text-xs text-slate-400 px-2">全閉じ</button>
      </div>

      {/* 色の凡例 */}
      <div className="flex gap-3 text-[10px] text-slate-400 mb-2 px-1">
        <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ background: '#ef4444' }} />0-39</span>
        <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ background: '#eab308' }} />40-69</span>
        <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ background: '#22c55e' }} />70-89</span>
        <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ background: '#3b82f6' }} />90-100</span>
      </div>

      {/* 章ごと */}
      <div className="space-y-2">
        {chapters.map((ch) => {
          let units = HISTORY_UNITS.filter((u) => u.ch === ch);
          if (filterTarget) units = units.filter((u) => (get(u.no).mastery || 0) < 80);
          if (filterTarget && units.length === 0) return null;
          const all = HISTORY_UNITS.filter((u) => u.ch === ch);
          const avg = all.reduce((a, u) => a + (get(u.no).mastery || 0), 0) / all.length;
          const isOpen = !!open[ch];
          return (
            <div key={ch} className="rounded-xl bg-navy-700 overflow-hidden">
              <button onClick={() => setOpen((o) => ({ ...o, [ch]: !o[ch] }))}
                className="w-full flex items-center gap-2 px-3 py-2.5 text-left active:bg-navy-600">
                <span className="text-xs text-slate-400 transition-transform" style={{ transform: isOpen ? 'rotate(90deg)' : 'none' }}>▶</span>
                <span className="text-xs font-bold text-slate-400 w-9">{ch}章</span>
                <span className="flex-1 text-sm font-medium truncate">{HISTORY_CHAPTERS[ch]}</span>
                <span className="tabnum text-xs font-bold w-9 text-right" style={{ color: masteryColor(avg) }}>{Math.round(avg)}%</span>
                <div className="w-16"><ProgressBar ratio={avg / 100} height={5} /></div>
              </button>

              {isOpen && (
                <div className="px-2 pb-2 space-y-1.5">
                  {units.map((u) => {
                    const p = get(u.no);
                    const col = masteryColor(p.mastery || 0);
                    return (
                      <div key={u.no} className="rounded-lg bg-navy-600 p-2.5" style={{ borderLeft: `4px solid ${col}` }}>
                        <div className="flex items-start gap-2">
                          <span className="text-[11px] font-bold text-slate-400 mt-0.5 w-6 shrink-0">{u.no}</span>
                          <span className="flex-1 text-sm leading-snug">{u.title}</span>
                          <span className="tabnum text-sm font-black shrink-0" style={{ color: col }}>{p.mastery || 0}%</span>
                        </div>
                        {/* 習熟度スライダー */}
                        <input type="range" min="0" max="100" step="5" value={p.mastery || 0}
                          onChange={(e) => update(u.no, { mastery: +e.target.value })}
                          className="w-full mt-2 h-1.5" style={{ accentColor: col }} />
                        {/* 状態・教材 */}
                        <div className="flex flex-wrap items-center gap-1.5 mt-2">
                          <select value={p.status} onChange={(e) => update(u.no, { status: e.target.value })}
                            className="bg-navy-700 rounded px-1.5 py-1 text-[11px] outline-none">
                            {HISTORY_STATUS.map((s) => <option key={s} value={s}>{s}</option>)}
                          </select>
                          {HISTORY_MATERIALS.map((mat) => {
                            const on = p.usedMaterials.includes(mat);
                            return (
                              <button key={mat} onClick={() => toggleMaterial(u.no, mat)}
                                className={'text-[11px] px-1.5 py-1 rounded border ' + (on ? 'bg-teal/20 border-teal/40 text-teal-100' : 'bg-navy-700 border-navy-500 text-slate-400')}>
                                {on ? '✓ ' : ''}{mat}
                              </button>
                            );
                          })}
                          {p.lastDate && <span className="text-[10px] text-slate-500 ml-auto">最終 {(() => { const d = parseYmd(p.lastDate); return `${d.m}/${d.d}`; })()}</span>}
                        </div>
                        <input value={p.note || ''} onChange={(e) => update(u.no, { note: e.target.value })} placeholder="メモ"
                          className="w-full mt-1.5 bg-navy-700/60 rounded px-2 py-1 text-[11px] outline-none" />
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* =========================================================================
 *  統計画面（Phase 5：統計グラフ）
 * ========================================================================= */
function StatsScreen({ data, setData, go }) {
  // 直近14日の学習時間（完了コマ分数→時間）
  const last14 = useMemo(() => {
    const arr = [];
    const t = parseYmd(todayYmd());
    for (let i = 13; i >= 0; i--) {
      const d = new Date(t.y, t.m - 1, t.d - i);
      const s = toYmd(d.getFullYear(), d.getMonth() + 1, d.getDate());
      arr.push({ s, dow: d.getDay(), day: d.getDate(), h: doneMinutes(logOf(data, s)) / 60, target: dayInfo(s).targetH });
    }
    return arr;
  }, [data]);
  const maxH = Math.max(10, ...last14.map((x) => Math.max(x.h, x.target)));

  // 今月の科目別割合
  const t = parseYmd(todayYmd());
  const monthAgg = useMemo(() => {
    const acc = { 英語: 0, 世界史: 0, 現代文: 0, 古文: 0, その他: 0 };
    Object.keys(data.dailyLogs || {}).forEach((s) => {
      const p = parseYmd(s);
      if (p.y === t.y && p.m === t.m) {
        (data.dailyLogs[s].slots || []).forEach((sl) => { acc[sl.subject] = (acc[sl.subject] || 0) + actualOf(sl); });
      }
    });
    const total = Object.values(acc).reduce((a, b) => a + b, 0) || 1;
    return { acc, total };
  }, [data]);

  // 累計・連続学習日数
  const cumulative = useMemo(() => {
    let total = 0;
    Object.keys(data.dailyLogs || {}).forEach((s) => { total += doneMinutes(logOf(data, s)); });
    // streak（今日からさかのぼって完了>0が続く日数）
    let streak = 0;
    const tt = parseYmd(todayYmd());
    for (let i = 0; i < 400; i++) {
      const d = new Date(tt.y, tt.m - 1, tt.d - i);
      const s = toYmd(d.getFullYear(), d.getMonth() + 1, d.getDate());
      if (doneMinutes(logOf(data, s)) > 0) streak++;
      else break;
    }
    return { totalH: total / 60, streak };
  }, [data]);

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="統計" data={data} setData={setData} />
      <NavTabs current="stats" go={go} />

      {/* 累計カード */}
      <div className="grid grid-cols-2 gap-2 my-3">
        <div className="bg-navy-700 rounded-xl p-3 text-center">
          <div className="text-xs text-slate-400">累計 学習時間</div>
          <div className="text-2xl font-black text-teal tabnum">{cumulative.totalH.toFixed(1)}<span className="text-sm">h</span></div>
        </div>
        <div className="bg-navy-700 rounded-xl p-3 text-center">
          <div className="text-xs text-slate-400">連続 学習日数</div>
          <div className="text-2xl font-black text-amber-400 tabnum">{cumulative.streak}<span className="text-sm">日 🔥</span></div>
        </div>
      </div>

      {/* 直近14日 棒グラフ */}
      <div className="bg-navy-700 rounded-xl p-3 mb-3">
        <div className="text-sm font-bold mb-2">直近14日の学習時間</div>
        <div className="flex gap-1">
          {/* Y軸目盛り（#F） */}
          <div className="flex flex-col justify-between h-36 text-[9px] text-slate-500 text-right pr-0.5 w-7 shrink-0">
            <span>{maxH}h</span>
            <span>{Number((maxH / 2).toFixed(1))}h</span>
            <span>0</span>
          </div>
          <div className="flex items-end gap-1 h-36 flex-1 border-l border-b border-navy-500/60 pl-1">
            {last14.map((x) => {
              const hgt = (x.h / maxH) * 100;
              const tgt = (x.target / maxH) * 100;
              const col = x.h >= x.target ? '#22c55e' : x.h > 0 ? '#2ec4b6' : '#39477d';
              return (
                <div key={x.s} className="flex-1 flex flex-col items-center justify-end h-full relative">
                  {/* 目標ライン */}
                  <div className="absolute left-0 right-0 border-t border-dashed border-slate-500/50" style={{ bottom: tgt + '%' }} />
                  <div className="w-full rounded-t relative" style={{ height: Math.max(hgt, 1) + '%', background: col }} title={x.h.toFixed(1) + 'h'} />
                  <span className={'text-[9px] mt-0.5 ' + (x.dow === 0 ? 'text-rose-300' : x.dow === 6 ? 'text-sky-300' : 'text-slate-400')}>{x.day}</span>
                </div>
              );
            })}
          </div>
        </div>
        <div className="text-[10px] text-slate-500 mt-1">— 破線は各日の目標時間</div>
      </div>

      {/* 今月の科目別割合 */}
      <div className="bg-navy-700 rounded-xl p-3">
        <div className="text-sm font-bold mb-2">今月（{t.m}月）の科目別割合</div>
        {monthAgg.total <= 1 && <p className="text-xs text-slate-500">今月の学習記録はまだありません。</p>}
        {/* 積み上げバー */}
        {monthAgg.total > 1 && (
          <>
            <div className="flex h-4 rounded-full overflow-hidden mb-2">
              {SUBJECTS.map((sub) => {
                const v = monthAgg.acc[sub] || 0;
                if (!v) return null;
                return <div key={sub} style={{ width: (v / monthAgg.total) * 100 + '%', background: SUBJECT_STYLE[sub].dot }} title={sub} />;
              })}
            </div>
            <div className="space-y-1">
              {SUBJECTS.map((sub) => {
                const v = (monthAgg.acc[sub] || 0) / 60;
                if (!v) return null;
                return (
                  <div key={sub} className="flex items-center gap-2 text-xs">
                    <span className="w-12 flex items-center gap-1"><SubjectDot subject={sub} />{sub}</span>
                    <span className="tabnum text-slate-300">{v.toFixed(1)}h</span>
                    <span className="tabnum text-slate-500">（{Math.round((monthAgg.acc[sub] / monthAgg.total) * 100)}%）</span>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* =========================================================================
 *  設定画面（Phase 5：セットメニュー編集・基本設定）
 * ========================================================================= */
function SettingsScreen({ data, setData, go }) {
  const setMenus = data.setMenus || {};
  const names = Object.keys(setMenus);
  const [openSet, setOpenSet] = useState(null);

  const updateSet = (name, arr) => setData((prev) => ({ ...prev, setMenus: { ...prev.setMenus, [name]: arr } }));
  const addSlot = (name) => updateSet(name, [...(setMenus[name] || []), { subject: '英語', menu: MENU_MASTER['英語'][0].name }]);
  const removeSlot = (name, i) => updateSet(name, setMenus[name].filter((_, idx) => idx !== i));
  const editSlot = (name, i, patch) => updateSet(name, setMenus[name].map((x, idx) => (idx === i ? { ...x, ...patch } : x)));

  const addSet = () => {
    const n = (window.prompt('新しいセットメニュー名') || '').trim();
    if (!n || setMenus[n]) return;
    setData((prev) => ({ ...prev, setMenus: { ...prev.setMenus, [n]: [] } }));
    setOpenSet(n);
  };
  const deleteSet = (name) => {
    if (!window.confirm(`「${name}」を削除しますか？`)) return;
    setData((prev) => { const c = { ...prev.setMenus }; delete c[name]; return { ...prev, setMenus: c }; });
  };
  const resetSets = () => {
    if (!window.confirm('セットメニューを初期状態に戻しますか？（編集内容は消えます）')) return;
    setData((prev) => ({ ...prev, setMenus: cloneSetMenus() }));
  };
  const clearAll = () => {
    if (!window.confirm('すべての学習データを削除して初期化しますか？この操作は元に戻せません。')) return;
    localStorage.removeItem(STORAGE_KEY);
    setData(seedData());
    go('#/');
  };

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="設定" data={data} setData={setData} />
      <NavTabs current="settings" go={go} />

      <div className="flex items-center justify-between mt-4 mb-1 px-1">
        <span className="text-xs font-bold text-teal">🍱 セットメニュー編集</span>
        <div className="flex gap-2">
          <button onClick={addSet} className="text-xs px-2 py-1 rounded bg-teal text-navy font-bold">＋新規</button>
          <button onClick={resetSets} className="text-xs px-2 py-1 rounded bg-navy-600 text-slate-300">初期化</button>
        </div>
      </div>

      <div className="space-y-2">
        {names.map((name) => {
          const isOpen = openSet === name;
          const set = setMenus[name] || [];
          return (
            <div key={name} className="rounded-xl bg-navy-700 overflow-hidden">
              <button onClick={() => setOpenSet(isOpen ? null : name)}
                className="w-full flex items-center gap-2 px-3 py-2.5 text-left active:bg-navy-600">
                <span className="text-xs text-slate-400" style={{ transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▶</span>
                <span className="flex-1 text-sm font-medium">{name}</span>
                <span className="text-xs text-slate-400">{set.length}コマ</span>
              </button>
              {isOpen && (
                <div className="px-2 pb-2 space-y-1.5">
                  {set.map((x, i) => {
                    const menus = MENU_MASTER[x.subject] || [];
                    return (
                      <div key={i} className="flex items-center gap-1.5 bg-navy-600 rounded-lg p-2">
                        <span className="text-[11px] text-slate-400 w-6">{i + 1}</span>
                        <select value={x.subject}
                          onChange={(e) => { const sub = e.target.value; const first = (MENU_MASTER[sub][0] || {}).name || ''; editSlot(name, i, { subject: sub, menu: first }); }}
                          className="bg-navy-700 rounded px-1.5 py-1 text-[11px] outline-none">
                          {SUBJECTS.map((s) => <option key={s} value={s}>{s}</option>)}
                        </select>
                        {x.subject === 'その他' ? (
                          <input value={x.menu} onChange={(e) => editSlot(name, i, { menu: e.target.value })}
                            className="flex-1 bg-navy-700 rounded px-1.5 py-1 text-[11px] outline-none" />
                        ) : (
                          <select value={x.menu} onChange={(e) => editSlot(name, i, { menu: e.target.value })}
                            className="flex-1 bg-navy-700 rounded px-1.5 py-1 text-[11px] outline-none">
                            {!menus.find((mm) => mm.name === x.menu) && <option value={x.menu}>{x.menu}</option>}
                            {menus.map((mm) => <option key={mm.name} value={mm.name}>{mm.name}</option>)}
                          </select>
                        )}
                        <button onClick={() => removeSlot(name, i)} className="text-rose-300 text-xs px-1">✕</button>
                      </div>
                    );
                  })}
                  <div className="flex gap-2">
                    <button onClick={() => addSlot(name)} className="flex-1 py-1.5 rounded-lg border border-dashed border-navy-500 text-slate-300 text-xs active:bg-navy-600">＋ コマ追加</button>
                    <button onClick={() => deleteSet(name)} className="px-3 py-1.5 rounded-lg bg-rose-500/20 text-rose-200 text-xs">セット削除</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* データ管理 */}
      <div className="text-xs font-bold text-teal mt-5 mb-1 px-1">💾 データ管理</div>
      <div className="bg-navy-700 rounded-xl p-3 text-sm text-slate-300 space-y-2">
        <p className="text-xs text-slate-400">バックアップは画面右上の「書き出し / 読み込み」から行えます（JSON）。</p>
        <button onClick={clearAll} className="text-xs px-3 py-1.5 rounded-lg bg-rose-500/20 text-rose-200">全データを初期化</button>
      </div>
    </div>
  );
}

/* =========================================================================
 *  ルーティング & App
 * ========================================================================= */
function useHash() {
  const [h, setH] = useState(location.hash || '#/');
  useEffect(() => {
    const f = () => setH(location.hash || '#/');
    window.addEventListener('hashchange', f);
    return () => window.removeEventListener('hashchange', f);
  }, []);
  return h;
}

function App() {
  const [data, setData] = useState(loadData);
  const hash = useHash();

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  }, [data]);

  const go = (path) => { location.hash = path; window.scrollTo(0, 0); };

  // #/day/YYYYMMDD
  const dayMatch = hash.match(/^#\/day\/(\d{8})/);
  if (dayMatch) {
    return <DayScreen data={data} setData={setData} date={dayMatch[1]} go={go} />;
  }
  if (hash.startsWith('#/history')) {
    return <HistoryScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/english')) {
    return <EnglishScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/weekly')) {
    return <WeeklyScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/goals')) {
    return <GoalsScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/stats')) {
    return <StatsScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/settings')) {
    return <SettingsScreen data={data} setData={setData} go={go} />;
  }
  return <CalendarScreen data={data} setData={setData} go={go} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
