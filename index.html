/* =========================================================================
 *  アラーム音（外部ファイル不要・Web Audioでビープ）＋バイブ

 *     ensureAudio() でオーディオを起こしておく。
 * ========================================================================= */
let _audioCtx = null;
function ensureAudio() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
  } catch (e) {}
}
function playAlarm() {
  try {
    ensureAudio();
    const ctx = _audioCtx;
    if (ctx) {
      const t0 = ctx.currentTime;
      [0, 0.5, 1.0].forEach((t) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = 880;
        o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.0001, t0 + t);
        g.gain.exponentialRampToValueAtTime(0.4, t0 + t + 0.03);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + t + 0.4);
        o.start(t0 + t); o.stop(t0 + t + 0.42);
      });
    }
  } catch (e) {}
  try { if (navigator.vibrate) navigator.vibrate([300, 150, 300, 150, 300]); } catch (e) {}
}

/* =========================================================================
 *  時間ユーティリティ（すべて「0:00からの分」で扱う。深夜は >1440 もありうる）
 * ========================================================================= */
const pad = (n) => String(n).padStart(2, '0');
// 分 → "H:MM"（25:00 のように24超も表示＝深夜2時を25時表記で。受験生の感覚に合わせる）
const minToHHMM = (min) => `${Math.floor(min / 60)}:${pad(min % 60)}`;
// "HH:MM" → 分
const hhmmToMin = (s) => {
  const [h, m] = s.split(':').map(Number);
  return h * 60 + m;
};

// 現在の「論理的な今日」と、その日のフレーム内での現在時刻(分)を返す
// confirmed #11: リミットを超えたら翌日扱い → 深夜は前日の延長フレームに属する
function getLogicalNow(limitMin) {
  const d = new Date();
  let mins = d.getHours() * 60 + d.getMinutes();
  const overhang = Math.max(0, limitMin - 1440); // 26:00 なら 120
  let date = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  let nowInFrame = mins;
  if (mins < overhang) {
    // まだ前日の延長戦（例: limit 26:00 で現在 1:00 → 前日の25:00）
    date.setDate(date.getDate() - 1);
    nowInFrame = mins + 1440;
  }
  const dateStr = `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
  return { dateStr, nowInFrame };
}

// "YYYY-MM-DD" ⇔ ローカルDate（タイムゾーンずれ防止のため手動パース）
const fmtDate = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const parseDate = (ds) => { const [y, m, d] = ds.split('-').map(Number); return new Date(y, m - 1, d); };
// その日が属する週の月曜日
function mondayOf(date) {
  const d = new Date(date); const wd = d.getDay();
  d.setDate(d.getDate() + (wd === 0 ? -6 : 1 - wd)); d.setHours(0, 0, 0, 0);
  return d;
}
// weekOffset 週ずらした月曜〜日曜の7日分（"YYYY-MM-DD"）
function weekDates(baseDate, weekOffset) {
  const m = mondayOf(baseDate); m.setDate(m.getDate() + weekOffset * 7);
  return Array.from({ length: 7 }, (_, i) => { const d = new Date(m); d.setDate(m.getDate() + i); return fmtDate(d); });
}
const monthKeyOf = (ds) => ds.slice(0, 7); // "YYYY-MM"
const hmLabel = (m) => `${Math.floor(m / 60)}時間${m % 60}分`;
// その日の「完了した学習」分（休憩・固定は除く＝総学習時間）
function studyDoneMin(day) {
  return (day?.tasks || []).reduce((a, t) => a + (t.status === 'done' && t.type === 'study' ? (t.actualMin || 0) : 0), 0);
}

/* =========================================================================
 *  スケジュール投影ロジック（コア）
 *  - done    : actualStart/actualEnd（実績）を使う
 *  - active  : actualStart から planned 分で投影
 *  - pending : カーソル位置（=直前の終わり）と「現在時刻」の遅い方から流す
 *              → 早く終われば前詰め、遅れれば後ろにスライド（confirmed #3）
 *  - 固定ブロック(fixed)は絶対時刻。pendingが重なるなら固定の後ろへ回避（#7）
 *  - リミット: 開始>=limit → 消滅 / 終了>limit → 短縮（#2,#5）
 * ========================================================================= */
function projectSchedule(tasks, dayStartMin, limitMin, nowInFrame) {
  // 固定ブロックの占有区間
  const fixedIntervals = tasks
    .filter((t) => t.type === 'fixed')
    .map((t) => ({ start: t.fixedStart, end: t.fixedEnd }))
    .sort((a, b) => a.start - b.start);

  // [start, start+dur) が固定区間に重なるなら、その固定の終わりへ押し出す
  const avoidFixed = (start, dur) => {
    let s = start;
    let moved = true;
    while (moved) {
      moved = false;
      for (const f of fixedIntervals) {
        if (s < f.end && s + dur > f.start) { // 重なり
          s = f.end;
          moved = true;
        }
      }
    }
    return s;
  };

  let cursor = dayStartMin;
  const result = [];

  for (const t of tasks) {
    const dur = t.actualMin != null && t.status === 'done' ? t.actualMin : t.plannedMin;

    if (t.type === 'fixed') {
      // 固定ブロックは絶対時刻の「障害物」。avoidFixed が pending を避けさせるので
      // ここでカーソルは進めない（朝の固定予定が午後の予定まで押し下げないように）。
      result.push({ ...t, projStart: t.fixedStart, projEnd: t.fixedEnd, vanished: false, cut: false });
      continue;
    }

    if (t.status === 'done') {
      const s = t.actualStart != null ? t.actualStart : cursor;
      const e = t.actualEnd != null ? t.actualEnd : s + dur;
      result.push({ ...t, projStart: s, projEnd: e, vanished: false, cut: false });
      cursor = Math.max(cursor, e);
      continue;
    }

    if (t.status === 'active') {
      const s = t.actualStart != null ? t.actualStart : cursor;
      const e = s + t.plannedMin;
      result.push({ ...t, projStart: s, projEnd: e, vanished: false, cut: false });
      cursor = Math.max(cursor, e);
      continue;
    }

    // pending
    let start = avoidFixed(Math.max(cursor, nowInFrame), t.plannedMin);
    let end = start + t.plannedMin;
    let vanished = false;
    let cut = false;

    if (start >= limitMin) {
      vanished = true; // 消滅（開始がリミットを越えた）
      result.push({ ...t, projStart: start, projEnd: end, vanished, cut });
      // 消滅タスクはカーソルを進めない
      continue;
    }
    if (end > limitMin) {
      end = limitMin; // 短縮
      cut = true;
    }
    result.push({ ...t, projStart: start, projEnd: end, vanished, cut });
    cursor = end;
  }
  return result;
}

const LS_KEY = 'yamanobori_v1';
function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {}
}

let _idc = 0;
const newId = () => `${Date.now()}_${_idc++}`;

/* =========================================================================
 *  タスク生成ヘルパー
 * ========================================================================= */
function makeStudyTask(cat, name, min) {
  return { id: newId(), type: 'study', cat, name, plannedMin: min, status: 'pending',
           actualStart: null, actualEnd: null, actualMin: null };
}
function makeRestTask(min) {
  return { id: newId(), type: 'rest', cat: '休憩', name: `休憩 ${min}分`, plannedMin: min,
           status: 'pending', actualStart: null, actualEnd: null, actualMin: null };
}
function makeFixedTask(name, startMin, endMin) {
  return { id: newId(), type: 'fixed', cat: '固定', name, plannedMin: endMin - startMin,
           fixedStart: startMin, fixedEnd: endMin, status: 'pending',
           actualStart: null, actualEnd: null, actualMin: null };
}
function expandSetMenu(def) {
  return def.map((d) => {
    if (d.t === 'rest') return makeRestTask(d.m);
    // min が指定されていればそれを使う。なければマスタの分数、それも無ければ30分。
    if (d.min != null) return makeStudyTask(d.c, d.n, d.min);
    const grp = STUDY_MASTER.find((g) => g.cat === d.c);
    const it = grp && grp.items.find((i) => i.name === d.n);
    return makeStudyTask(d.c, d.n, it ? it.min : 30);
  });
}

/* =========================================================================
 *  アプリ本体
 * ========================================================================= */
function App() {
  const persisted = loadState();
  // 既定値に保存済みを上書き（recurringFixed が無い古い保存にもデフォルトが入る）
  const [settings, setSettings] = useState({
    limit: '24:00', dayStart: '6:00', recurringFixed: DEFAULT_RECURRING, monthlyGoals: {},
    ...(persisted.settings || {}),
  });
  // セットメニューはバージョンが一致する時だけ保存値を使う（古い仮置きを自動更新）
  const [setmenus, setSetmenus] = useState(
    persisted.smv === CURRENT_SMV && persisted.setmenus ? persisted.setmenus : DEFAULT_SETMENUS
  );
  const [days, setDays] = useState(persisted.days || {}); // { dateStr: { tasks, evaluation, skipFixed } }

  const limitMin = hhmmToMin(settings.limit);
  const dayStartMin = hhmmToMin(settings.dayStart);

  // 毎秒更新（タイマー・投影の再計算用）
  const [, force] = useState(0);
  useEffect(() => {
    const id = setInterval(() => force((x) => x + 1), 1000);
    return () => clearInterval(id);
  }, []);

  const { dateStr, nowInFrame } = getLogicalNow(limitMin);
  const today = days[dateStr] || { tasks: [], evaluation: null };

  // 永続化
  useEffect(() => { saveState({ settings, setmenus, days, smv: CURRENT_SMV }); }, [settings, setmenus, days]);

  // モーダル
  const [modal, setModal] = useState(null); // 'add' | 'set' | 'settings' | 'eval' | {edit:task}

  /* ---- タスク操作 ---- */
  const updateToday = (mut) => {
    setDays((prev) => {
      const cur = prev[dateStr] || { tasks: [], evaluation: null };
      const next = mut({ ...cur, tasks: [...cur.tasks] });
      return { ...prev, [dateStr]: next };
    });
  };
  const addTasks = (arr) => updateToday((d) => ({ ...d, tasks: [...d.tasks, ...arr] }));
  // 任意の日付のタスクを差し替え（週間プランニング用）
  const setDayTasks = (ds, tasks) => setDays((prev) => ({ ...prev, [ds]: { evaluation: null, skipFixed: [], ...(prev[ds] || {}), tasks } }));
  const removeTask = (id) => updateToday((d) => ({ ...d, tasks: d.tasks.filter((t) => t.id !== id) }));
  const replaceTask = (id, patch) =>
    updateToday((d) => ({ ...d, tasks: d.tasks.map((t) => (t.id === id ? { ...t, ...patch } : t)) }));
  const clearDay = () => { if (confirm('今日の予定をすべて消去しますか？')) updateToday((d) => ({ tasks: [], evaluation: null, skipFixed: d.skipFixed || [] })); };
  // くりかえし固定予定を「今日だけ」非表示にする
  const skipRecurring = (rfId) => updateToday((d) => ({ ...d, skipFixed: [...(d.skipFixed || []), rfId] }));

  // 並び替え（未完了の学習・休憩ブロックのみ対象。固定予定は絶対時刻なので動かさない）
  const moveTask = (id, dir) => updateToday((d) => {
    const flex = d.tasks.map((t, i) => ({ t, i })).filter(({ t }) => (t.type === 'study' || t.type === 'rest') && t.status === 'pending');
    const pos = flex.findIndex(({ t }) => t.id === id);
    const swap = dir < 0 ? pos - 1 : pos + 1;
    if (pos < 0 || swap < 0 || swap >= flex.length) return d;
    const a = flex[pos].i, b = flex[swap].i;
    const nt = [...d.tasks];
    [nt[a], nt[b]] = [nt[b], nt[a]];
    return { ...d, tasks: nt };
  });

  const startTask = (id) => {
    // 同時に動かせるタイマーは1つ（confirmed #12）
    const active = today.tasks.find((t) => t.status === 'active');
    if (active && active.id !== id) { alert('別のタスクが進行中です。先に終了してください。'); return; }
    ensureAudio(); // 開始ボタン押下（ユーザー操作）でオーディオを起こす→後でアラームが鳴る
    replaceTask(id, { status: 'active', actualStart: nowInFrame, actualStartMs: Date.now(), actualEnd: null });
  };
  const stopTask = (id) => {
    const t = today.tasks.find((x) => x.id === id);
    // 実測はミリ秒のタイムスタンプ優先（秒単位で正確に）
    const dur = t.actualStartMs
      ? Math.max(1, Math.round((Date.now() - t.actualStartMs) / 60000))
      : Math.max(1, Math.round(nowInFrame - (t.actualStart ?? nowInFrame)));
    replaceTask(id, { status: 'done', actualEnd: nowInFrame, actualMin: dur });
  };
  const extendTask = (id, min) => {
    const t = today.tasks.find((x) => x.id === id);
    if (t) replaceTask(id, { plannedMin: t.plannedMin + min });
  };

  /* ---- くりかえし固定予定を今日の曜日に応じて注入 ---- */
  const weekday = parseDate(dateStr).getDay();
  const injectedFixed = (settings.recurringFixed || [])
    .filter((rf) => rf.days.includes(weekday) && !(today.skipFixed || []).includes(rf.id))
    .map((rf) => ({
      id: 'rf_' + rf.id, type: 'fixed', cat: '固定', name: rf.name,
      plannedMin: hhmmToMin(rf.end) - hhmmToMin(rf.start),
      fixedStart: hhmmToMin(rf.start), fixedEnd: hhmmToMin(rf.end),
      status: 'pending', injected: true, rfId: rf.id,
    }));
  const effectiveTasks = [...injectedFixed, ...today.tasks];

  /* ---- 投影 ---- */
  const projected = useMemo(
    () => projectSchedule(effectiveTasks, dayStartMin, limitMin, nowInFrame),
    [effectiveTasks, dayStartMin, limitMin, nowInFrame]
  );
  const active   = projected.find((t) => t.status === 'active');
  // 表示は時刻順に並べる（固定予定が正しい時間位置に入るように）
  const pending  = projected.filter((t) => t.status === 'pending' && !t.vanished).sort((a, b) => a.projStart - b.projStart);
  const vanished = projected.filter((t) => t.vanished);
  const done     = projected.filter((t) => t.status === 'done');
  const nextUp   = pending[0];

  // 実績合計（分）
  const doneMin = done.reduce((a, t) => a + (t.actualMin || 0), 0);
  // 山のぼり進捗（固定予定は数えない）
  const flexPendingCount = pending.filter((t) => t.type !== 'fixed').length;

  return (
    <div className="max-w-md mx-auto min-h-screen flex flex-col">
      {/* ヘッダー */}
      <header className="px-4 pt-4 pb-2 sticky top-0 bg-orange-50/90 backdrop-blur z-10">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-xs text-slate-500">{dateStr}（{WD[parseDate(dateStr).getDay()]}）</div>
            <div className="text-2xl font-bold tabnum">{minToHHMM(Math.floor(nowInFrame))}</div>
          </div>
          <div className="text-right">
            <div className="text-xs text-slate-500">今日の実績</div>
            <div className="text-lg font-bold text-orange-600 tabnum">{Math.floor(doneMin / 60)}時間{doneMin % 60}分</div>
            <div className="flex gap-2 justify-end mt-0.5">
              <button onClick={() => setModal('mountain')} className="text-xs text-slate-400 underline">🏔️ 実績</button>
              <button onClick={() => setModal('weekly')} className="text-xs text-slate-400 underline">📅 週間</button>
              <button onClick={() => setModal('settings')} className="text-xs text-slate-400 underline">⚙ 設定</button>
            </div>
          </div>
        </div>
        {/* 簡易・山のぼり進捗バー（実績/その日のpending+done予定の比率） */}
        <ProgressBar done={done.length} total={done.length + flexPendingCount} />
      </header>

      <main className="flex-1 px-4 pb-28 space-y-4">
        {/* 土曜日の作戦会議バナー（confirmed: ウィークリー） */}
        {weekday === 6 && (
          <button onClick={() => setModal('weekly')} className="w-full text-left bg-gradient-to-r from-indigo-100 to-sky-100 border border-indigo-200 rounded-2xl p-3 active:scale-95 transition">
            <div className="text-sm font-bold text-indigo-700">📅 土曜日の作戦会議</div>
            <div className="text-xs text-indigo-500">来週1週間分のスケジュールをまとめて立てよう →</div>
          </button>
        )}

        {/* 進行中タスク */}
        {active && (
          <ActiveCard task={active} onStop={() => stopTask(active.id)} onEdit={() => setModal({ edit: active })} onExtend={(m) => extendTask(active.id, m)} />
        )}

        {/* 次にやること */}
        {!active && nextUp && (
          <div>
            <div className="text-xs font-semibold text-slate-400 mb-1">▶ 今やること</div>
            <NextCard task={nextUp} onStart={() => startTask(nextUp.id)} onEdit={() => setModal({ edit: nextUp })}
              onRemove={() => (nextUp.injected ? skipRecurring(nextUp.rfId) : removeTask(nextUp.id))}
              onMoveDown={() => moveTask(nextUp.id, 1)} canMoveDown={flexPendingCount > 1 && nextUp.type !== 'fixed'} />
          </div>
        )}

        {/* 残りのスケジュール（confirmed #1: 全タスクをコンパクトに一覧） */}
        {pending.length > (active ? 0 : 1) && (
          <div>
            <div className="text-xs font-semibold text-slate-400 mb-1">残りの予定（{pending.length - (active ? 0 : 1)}件）・▲▼で並び替え</div>
            <div className="space-y-1">
              {pending.slice(active ? 0 : 1).map((t) => (
                <CompactRow key={t.id} task={t}
                  onEdit={() => setModal({ edit: t })}
                  onRemove={() => (t.injected ? skipRecurring(t.rfId) : removeTask(t.id))}
                  onMoveUp={() => moveTask(t.id, -1)} onMoveDown={() => moveTask(t.id, 1)} />
              ))}
            </div>
          </div>
        )}

        {/* 消滅タスク（当日限り表示・confirmed #5） */}
        {vanished.length > 0 && (
          <Collapsible title={`💨 リミット超過で消滅（${vanished.length}件）`} color="text-slate-400">
            {vanished.map((t) => (
              <div key={t.id} className="flex items-center justify-between text-sm text-slate-400 line-through py-1">
                <span>{t.name}</span>
                <span className="tabnum">{t.plannedMin}分</span>
              </div>
            ))}
          </Collapsible>
        )}

        {/* 完了タスク（メインから隠す＝折りたたみ） */}
        {done.length > 0 && (
          <Collapsible title={`✓ 完了（${done.length}件）`} color="text-emerald-600">
            {done.map((t) => (
              <DoneRow key={t.id} task={t} onEdit={() => setModal({ edit: t })} />
            ))}
          </Collapsible>
        )}

        {today.tasks.length === 0 && (
          <div className="text-center text-slate-400 py-16 text-sm">
            まだ予定がありません。<br />下のボタンから追加するか、セットメニューで一括展開できます。
          </div>
        )}
      </main>

      {/* 下部アクションバー */}
      <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-orange-100">
        <div className="max-w-md mx-auto px-4 py-3 flex gap-2">
          <button onClick={() => setModal('add')} className="flex-1 bg-orange-500 text-white rounded-xl py-2.5 text-sm font-bold active:scale-95 transition">＋ タスク</button>
          <button onClick={() => setModal('set')} className="flex-1 bg-amber-100 text-amber-700 rounded-xl py-2.5 text-sm font-bold active:scale-95 transition">セット展開</button>
          <button onClick={() => setModal('eval')} className="flex-1 bg-emerald-100 text-emerald-700 rounded-xl py-2.5 text-sm font-bold active:scale-95 transition">今日の評価</button>
        </div>
      </div>

      {/* モーダル類 */}
      {modal === 'add' && <AddModal onAdd={(arr) => { addTasks(arr); }} onClose={() => setModal(null)} />}
      {modal === 'set' && <SetMenuModal setmenus={setmenus} onExpand={(name) => { addTasks(expandSetMenu(setmenus[name])); setModal(null); }} onClose={() => setModal(null)} />}
      {modal === 'settings' && (
        <SettingsModal
          settings={settings} setSettings={setSettings}
          setmenus={setmenus} setSetmenus={setSetmenus}
          currentTasks={today.tasks}
          onClose={() => setModal(null)}
        />
      )}
      {modal === 'eval' && <EvalModal today={today} onSave={(v) => { updateToday((d) => ({ ...d, evaluation: v })); }} onShowMountain={() => setModal('mountain')} onClose={() => setModal(null)} />}
      {modal === 'weekly' && (
        <WeeklyModal
          todayStr={dateStr} days={days} setmenus={setmenus} settings={settings}
          onApplyDay={(ds, name) => setDayTasks(ds, expandSetMenu(setmenus[name]))}
          onClearDay={(ds) => setDayTasks(ds, [])}
          onClose={() => setModal(null)}
        />
      )}
      {modal === 'mountain' && (
        <AchievementModal todayStr={dateStr} days={days} settings={settings} setSettings={setSettings} onClose={() => setModal(null)} />
      )}
      {modal && modal.edit && (
        <EditModal task={modal.edit} onSave={(patch) => { replaceTask(modal.edit.id, patch); setModal(null); }} onClose={() => setModal(null)} />
      )}
    </div>
  );
}

    <div className="mt-2">
      <div className="relative h-3 bg-orange-100 rounded-full overflow-hidden">
        <div className="absolute inset-y-0 left-0 bg-gradient-to-r from-orange-400 to-amber-400 rounded-full transition-all duration-500" style={{ width: `${pct}%` }} />
        <div className="absolute -top-0.5 text-xs transition-all duration-500" style={{ left: `calc(${pct}% - 8px)` }}>🧗</div>
      </div>
      <div className="text-right text-[10px] text-slate-400 mt-0.5">今日 {done}/{total}</div>
    </div>
  );
}

function CatBadge({ cat }) {
  return <span className={`text-[10px] px-1.5 py-0.5 rounded border ${CAT_COLOR[cat] || CAT_COLOR['休憩']}`}>{cat}</span>;
}

function ActiveCard({ task, onStop, onEdit, onExtend }) {
  const alarmedRef = useRef(false);
  // 残り時間はミリ秒タイムスタンプから秒単位で正確に計算（App側の毎秒再描画で更新）
  const startMs = task.actualStartMs || Date.now();
  const totalSec = Math.max(1, task.plannedMin * 60);
  const remainingSec = Math.round(totalSec - (Date.now() - startMs) / 1000);
  const isOver = remainingSec <= 0;
  const absSec = Math.abs(remainingSec);
  const mm = Math.floor(absSec / 60), ss = absSec % 60;
  const ratio = Math.max(0, Math.min(1, remainingSec / totalSec));

  // 残り0で一度だけアラーム。延長（plannedMin変化）やタスク変更で再武装。
  useEffect(() => { alarmedRef.current = false; }, [task.id, task.plannedMin]);
  useEffect(() => {
    if (isOver && !alarmedRef.current) { alarmedRef.current = true; playAlarm(); }
  });

  return (
    <div className={`bg-white rounded-2xl shadow-lg border-2 ${isOver ? 'border-rose-400' : 'border-orange-300'} p-4`}>
      <div className="flex items-center gap-2 mb-1">
        <CatBadge cat={task.cat} />
        <span className={`text-xs font-bold animate-pulse ${isOver ? 'text-rose-500' : 'text-orange-500'}`}>● 進行中</span>
      </div>
      <div className="text-xl font-bold">{task.name}</div>
      <div className={`text-5xl font-bold tabnum my-2 text-center ${isOver ? 'text-rose-500' : 'text-orange-600'}`}>
        {isOver ? '+' : ''}{pad(mm)}:{pad(ss)}
      </div>
      {/* 残り時間バー（減っていく） */}
      <div className="h-2 bg-orange-100 rounded-full overflow-hidden mb-1">
        <div className={`h-full rounded-full ${isOver ? 'bg-rose-400' : 'bg-orange-400'}`} style={{ width: `${ratio * 100}%`, transition: 'width 0.5s linear' }} />
      </div>
      <div className={`text-center text-xs mb-3 ${isOver ? 'text-rose-500 font-bold' : 'text-slate-400'}`}>
        {isOver ? '⏰ 時間です！ 延長 or 終了' : `残り（予定 ${task.plannedMin}分）`}
      </div>
      {/* 延長ボタン */}
      <div className="flex gap-2 mb-2">
        <button onClick={() => onExtend(5)} className="flex-1 bg-amber-100 text-amber-700 rounded-xl py-2.5 text-sm font-bold active:scale-95 transition">＋5分 延長</button>
        <button onClick={() => onExtend(10)} className="flex-1 bg-amber-100 text-amber-700 rounded-xl py-2.5 text-sm font-bold active:scale-95 transition">＋10分 延長</button>
      </div>
      <div className="flex gap-2">
        <button onClick={onStop} className="flex-1 bg-orange-500 text-white rounded-xl py-3 font-bold active:scale-95 transition">⏹ 終了</button>
        <button onClick={onEdit} className="px-4 bg-slate-100 text-slate-500 rounded-xl py-3 text-sm">修正</button>
      </div>
    </div>
  );
}

      <button onClick={onEdit} className="text-slate-300 text-xs px-1">✎</button>
    </div>
  );
}

// 週間プランニング（土曜日の作戦会議）
function WeeklyModal({ todayStr, days, setmenus, settings, onApplyDay, onClearDay, onClose }) {
  const todayWd = parseDate(todayStr).getDay();
  // 週末に開いたら来週を初期表示（作戦会議は翌週分を立てる想定）
  const [weekOffset, setWeekOffset] = useState(todayWd === 6 || todayWd === 0 ? 1 : 0);
  const [weekdayPlan, setWeekdayPlan] = useState('');
  const [weekendPlan, setWeekendPlan] = useState('');
  const names = Object.keys(setmenus);
  const dates = weekDates(parseDate(todayStr), weekOffset);

  const studyMinOf = (ds) => (days[ds]?.tasks || []).filter((t) => t.type === 'study').reduce((a, t) => a + t.plannedMin, 0);
  const countOf = (ds) => (days[ds]?.tasks || []).length;
  const fixedChips = (ds) => (settings.recurringFixed || []).filter((rf) => rf.days.includes(parseDate(ds).getDay()));

  const applyOne = (ds, name) => {
    if (!name) return;
    if (countOf(ds) > 0 && !confirm(`${ds} の予定を「${name}」で上書きします。よろしいですか？`)) return;
    onApplyDay(ds, name);
  };
  const applyWeek = () => {
    if (!weekdayPlan && !weekendPlan) { alert('平日プラン or 土日プランを選んでください。'); return; }
    if (!confirm('選んだ週の予定を一括で上書きします。よろしいですか？')) return;
    dates.forEach((ds) => {
      const wd = parseDate(ds).getDay();
      const name = (wd === 0 || wd === 6) ? weekendPlan : weekdayPlan;
      if (name) onApplyDay(ds, name);
    });
  };

  const m0 = parseDate(dates[0]), m6 = parseDate(dates[6]);
  const weekLabel = `${m0.getMonth() + 1}/${m0.getDate()} 〜 ${m6.getMonth() + 1}/${m6.getDate()}`;

  return (
    <ModalShell title="週間プランニング" onClose={onClose}>
      {/* 週ナビ */}
      <div className="flex items-center justify-between mb-3">
        <button onClick={() => setWeekOffset((w) => w - 1)} className="px-3 py-1.5 bg-slate-100 rounded-lg text-sm">◀</button>
        <div className="text-center">
          <div className="font-bold text-sm">{weekLabel}</div>
          <div className="text-[11px] text-slate-400">{weekOffset === 0 ? '今週' : weekOffset === 1 ? '来週' : `${weekOffset > 0 ? '+' : ''}${weekOffset}週`}</div>
        </div>
        <button onClick={() => setWeekOffset((w) => w + 1)} className="px-3 py-1.5 bg-slate-100 rounded-lg text-sm">▶</button>
      </div>

      {/* 一括適用 */}
      <div className="bg-indigo-50 rounded-xl p-3 mb-3">
        <div className="text-xs font-bold text-indigo-700 mb-2">セットで一括作成</div>
        <div className="space-y-2">
          <label className="flex items-center gap-2 text-sm">
            <span className="text-slate-500 w-16 shrink-0">平日</span>
            <select value={weekdayPlan} onChange={(e) => setWeekdayPlan(e.target.value)} className="flex-1 border rounded-lg px-2 py-1.5 text-sm bg-white">
              <option value="">—</option>
              {names.map((n) => <option key={n} value={n}>{n}</option>)}
            </select>
          </label>
          <label className="flex items-center gap-2 text-sm">
            <span className="text-slate-500 w-16 shrink-0">土日</span>
            <select value={weekendPlan} onChange={(e) => setWeekendPlan(e.target.value)} className="flex-1 border rounded-lg px-2 py-1.5 text-sm bg-white">
              <option value="">—</option>
              {names.map((n) => <option key={n} value={n}>{n}</option>)}
            </select>
          </label>
        </div>
        <button onClick={applyWeek} className="w-full bg-indigo-500 text-white rounded-lg py-2 text-sm font-bold mt-2">この週に一括適用</button>
      </div>

      {/* 日別 */}
      <div className="space-y-2">
        {dates.map((ds) => {
          const d = parseDate(ds), wd = d.getDay();
          const studyMin = studyMinOf(ds);
          const isToday = ds === todayStr;
          const isWeekend = wd === 0 || wd === 6;
          return (
            <div key={ds} className={`rounded-xl p-2.5 border ${isToday ? 'border-orange-300 bg-orange-50' : isWeekend ? 'border-slate-200 bg-rose-50/40' : 'border-slate-200 bg-white'}`}>
              <div className="flex items-center gap-2">
                <div className="w-12 shrink-0">
                  <div className={`text-sm font-bold ${wd === 0 ? 'text-rose-500' : wd === 6 ? 'text-blue-500' : 'text-slate-700'}`}>{WD[wd]} <span className="text-xs text-slate-400">{d.getDate()}</span></div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs text-slate-500">
                    {countOf(ds) > 0 ? <span className="text-emerald-600 font-bold">学習{Math.floor(studyMin / 60)}h{studyMin % 60}m</span> : <span className="text-slate-300">予定なし</span>}
                    {fixedChips(ds).map((rf) => <span key={rf.id} className="ml-1 text-[10px] text-purple-500">📌{rf.name}</span>)}
                  </div>
                </div>
                <select value="" onChange={(e) => { applyOne(ds, e.target.value); e.target.value = ''; }} className="border rounded-lg px-1.5 py-1 text-xs bg-white shrink-0 max-w-[7rem]">
                  <option value="">セット…</option>
                  {names.map((n) => <option key={n} value={n}>{n}</option>)}
                </select>
                {countOf(ds) > 0 && <button onClick={() => onClearDay(ds)} className="text-slate-300 text-xs px-1 shrink-0">✕</button>}
              </div>
            </div>
          );
        })}
      </div>
      <p className="text-[11px] text-slate-400 mt-3">※ 学校などのくりかえし固定予定（📌）は当日に自動で入ります。土日は学校が出ません。</p>
    </ModalShell>
  );
}

// 実績・山のぼり（Phase 3）：月間目標＝頂上、累計実績で登る＋グラフ
const MTN_CAT_COLOR = { '英語': '#3b82f6', '世界史': '#f59e0b', '古文': '#10b981', '現代文': '#f43f5e' };
function AchievementModal({ todayStr, days, settings, setSettings, onClose }) {
  const mk = monthKeyOf(todayStr);
  const goalHours = (settings.monthlyGoals || {})[mk] || 0;
  const goalMin = goalHours * 60;

  // 今月の累計学習（done・study）と科目別内訳
  let monthMin = 0; const perCat = {};
  Object.keys(days).forEach((ds) => {
    if (ds.startsWith(mk)) {
      (days[ds].tasks || []).forEach((t) => {
        if (t.status === 'done' && t.type === 'study') {
          monthMin += t.actualMin || 0;
          perCat[t.cat] = (perCat[t.cat] || 0) + (t.actualMin || 0);
        }
      });
    }
  });
  const progress = goalMin > 0 ? Math.min(1, monthMin / goalMin) : 0;
  const gou = Math.floor(progress * 10); // 何合目
  const remainMin = Math.max(0, goalMin - monthMin);

  // 直近7日の学習（日別）
  const week = [];
  for (let i = 6; i >= 0; i--) {
    const d = parseDate(todayStr); d.setDate(d.getDate() - i);
    const ds = fmtDate(d);
    week.push({ ds, wd: d.getDay(), date: d.getDate(), m: studyDoneMin(days[ds]) });
  }
  const weekMax = Math.max(60, ...week.map((w) => w.m));

  const setGoal = (h) => setSettings((s) => ({ ...s, monthlyGoals: { ...(s.monthlyGoals || {}), [mk]: h } }));

  // 山の左斜面 (20,220)→(150,30) 上をパラメータ t で進む
  const px = (t) => 20 + t * 130, py = (t) => 220 - t * 190;

  return (
    <ModalShell title="🏔️ 実績・山のぼり" onClose={onClose}>
      {/* 目標設定 */}
      <div className="bg-orange-50 rounded-xl p-3 mb-3">
        <label className="flex items-center justify-between text-sm">
          <span className="text-slate-600 font-bold">{mk.replace('-', '年')}月の目標</span>
          <span className="flex items-center gap-1">
            <input type="number" value={goalHours || ''} placeholder="0" onChange={(e) => setGoal(Number(e.target.value) || 0)}
              className="w-20 border rounded-lg px-2 py-1.5 text-right text-sm" />
            <span className="text-slate-500 text-sm">時間</span>
          </span>
        </label>
        <div className="flex gap-1.5 mt-2">
          {[50, 100, 150, 200, 250].map((h) => (
            <button key={h} onClick={() => setGoal(h)} className="flex-1 bg-white border border-orange-200 rounded-lg py-1 text-xs text-orange-600">{h}h</button>
          ))}
        </div>
      </div>

      {/* 山のぼり */}
      <div className="bg-gradient-to-b from-sky-100 to-emerald-50 rounded-2xl p-2 mb-3">
        <svg viewBox="0 0 300 240" className="w-full">
          <polygon points="20,220 150,30 280,220" fill="#cbb292" />
          <polygon points="118,82 150,30 182,82" fill="#ffffff" />
          <line x1="20" y1="220" x2="150" y2="30" stroke="#ffffff" strokeDasharray="5 5" strokeWidth="2" opacity="0.7" />
          {/* 合目マーカー */}
          {[...Array(9)].map((_, i) => {
            const t = (i + 1) / 10;
            return <circle key={i} cx={px(t)} cy={py(t)} r="3.5" fill={progress >= t ? '#f59e0b' : '#e2e8f0'} stroke="#fff" strokeWidth="1" />;
          })}
          <text x="150" y="24" textAnchor="middle" fontSize="18">🚩</text>
          {/* 登山者（progressへアニメ移動） */}
          <g style={{ transition: 'transform 1.2s ease' }} transform={`translate(${px(progress) - 9},${py(progress) - 6})`}>
            <text fontSize="20">🧗</text>
          </g>
        </svg>
        <div className="text-center -mt-1">
          {goalMin > 0 ? (
            <>
              <div className="text-2xl font-bold text-orange-600">{gou}合目<span className="text-sm text-slate-400 ml-1">（{Math.round(progress * 100)}%）</span></div>
              <div className="text-xs text-slate-500">{hmLabel(monthMin)} / 目標 {goalHours}時間 ・ あと {hmLabel(remainMin)}</div>
            </>
          ) : (
            <div className="text-sm text-slate-400 py-1">上で今月の目標を決めると、山に登り始めます！</div>
          )}
        </div>
      </div>

      {/* 直近7日グラフ */}
      <div className="mb-3">
        <div className="text-xs font-bold text-slate-500 mb-2">直近7日の学習時間</div>
        <div className="flex items-end justify-between gap-1 h-28 bg-slate-50 rounded-xl p-2">
          {week.map((w) => {
            const h = Math.round((w.m / weekMax) * 100);
            const isToday = w.ds === todayStr;
            return (
              <div key={w.ds} className="flex-1 flex flex-col items-center justify-end h-full">
                <div className="text-[9px] text-slate-400 tabnum">{w.m > 0 ? `${Math.floor(w.m / 60)}.${Math.round((w.m % 60) / 6)}` : ''}</div>
                <div className={`w-full rounded-t ${isToday ? 'bg-orange-500' : 'bg-orange-300'}`} style={{ height: `${Math.max(2, h)}%`, transition: 'height 0.6s ease' }} />
                <div className={`text-[10px] mt-1 ${w.wd === 0 ? 'text-rose-400' : w.wd === 6 ? 'text-blue-400' : 'text-slate-400'}`}>{WD[w.wd]}</div>
              </div>
            );
          })}
        </div>
        <div className="text-[10px] text-slate-300 text-right mt-0.5">数値は時間（h）</div>
      </div>

      {/* 今月の科目別内訳 */}
      <div>
        <div className="text-xs font-bold text-slate-500 mb-2">今月の科目別</div>
        {Object.keys(perCat).length === 0 ? (
          <div className="text-sm text-slate-300 text-center py-3">まだ実績がありません</div>
        ) : (
          <div className="space-y-1.5">
            {['英語', '世界史', '古文', '現代文'].filter((c) => perCat[c]).map((c) => {
              const w = Math.round((perCat[c] / monthMin) * 100);
              return (
                <div key={c} className="flex items-center gap-2 text-xs">
                  <span className="w-12 shrink-0 text-slate-500">{c}</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-4 overflow-hidden">
                    <div className="h-full rounded-full flex items-center justify-end pr-1.5 text-[9px] text-white font-bold"
                      style={{ width: `${Math.max(12, w)}%`, background: MTN_CAT_COLOR[c], transition: 'width 0.6s ease' }}>{w}%</div>
                  </div>
                  <span className="w-14 shrink-0 text-right text-slate-400 tabnum">{hmLabel(perCat[c])}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </ModalShell>
  );
}

function EditModal({ task, onSave, onClose }) {
  const [plannedMin, setPlannedMin] = useState(task.plannedMin);
  const [startStr, setStartStr] = useState(task.actualStart != null ? minToHHMM(Math.round(task.actualStart % 1440)) : '');
  const [endStr, setEndStr] = useState(task.actualEnd != null ? minToHHMM(Math.round(task.actualEnd % 1440)) : '');
  const isDoneOrActive = task.status === 'done' || task.status === 'active';

  const save = () => {
    const patch = { plannedMin: Number(plannedMin) || task.plannedMin };
    if (isDoneOrActive) {
      if (startStr) patch.actualStart = hhmmToMin(startStr);
      if (endStr)   patch.actualEnd = hhmmToMin(endStr);
      if (patch.actualStart != null && patch.actualEnd != null) {
        patch.actualMin = Math.max(1, patch.actualEnd - patch.actualStart);
      }
    }
    onSave(patch);
  };
  return (
    <ModalShell title="タスクを修正" onClose={onClose}>
      <div className="mb-3"><CatBadge cat={task.cat} /> <span className="font-bold">{task.name}</span></div>
      <label className="block text-sm mb-3">
        <span className="text-slate-500">予定時間（分）</span>
        <input type="number" value={plannedMin} onChange={(e) => setPlannedMin(e.target.value)} className="w-full border rounded-lg px-3 py-2 mt-1" />
      </label>
      {isDoneOrActive && (
        <div className="bg-orange-50 rounded-xl p-3 mb-3">
          <p className="text-xs text-slate-500 mb-2">⏱ 押し忘れた？ 実際の開始・終了を手で直せます。</p>
          <div className="flex items-center gap-2">
            <input type="time" value={startStr} onChange={(e) => setStartStr(e.target.value)} className="border rounded-lg px-2 py-2 text-sm flex-1" />
            <span className="text-slate-400">〜</span>
            <input type="time" value={endStr} onChange={(e) => setEndStr(e.target.value)} className="border rounded-lg px-2 py-2 text-sm flex-1" />
          </div>
        </div>
      )}
      <button onClick={save} className="w-full bg-orange-500 text-white rounded-xl py-3 font-bold">保存</button>
    </ModalShell>
  );
}

function EvalModal({ today, onSave, onShowMountain, onClose }) {
  const [stars, setStars] = useState(today.evaluation?.stars || 0);
  const [comment] = useState(() => FEEDBACKS[Math.floor(Math.random() * FEEDBACKS.length)]);
  const [saved, setSaved] = useState(false);
  const doneMin = today.tasks.filter((t) => t.status === 'done').reduce((a, t) => a + (t.actualMin || 0), 0);
  return (
    <ModalShell title="今日の自己評価" onClose={onClose}>
      <div className="text-center">
        <p className="text-sm text-slate-500 mb-1">今日の実績</p>
        <p className="text-2xl font-bold text-orange-600 mb-4">{Math.floor(doneMin/60)}時間{doneMin%60}分</p>
        <div className="flex justify-center gap-1 mb-4">
          {[1,2,3,4,5].map((n) => (
            <button key={n} onClick={() => setStars(n)} className={`text-4xl ${n <= stars ? 'opacity-100' : 'opacity-25'}`}>⭐</button>
          ))}
        </div>
        {!saved ? (
          <button onClick={() => { onSave({ stars, comment, doneMin }); setSaved(true); }}
            disabled={stars === 0}
            className="w-full bg-emerald-500 disabled:opacity-40 text-white rounded-xl py-3 font-bold">記録する</button>
        ) : (
          <div className="bg-emerald-50 rounded-2xl p-4 mt-2">
            <div className="text-5xl mb-2 animate-bounce">🏔️</div>
            <p className="text-emerald-700 font-bold mb-3">{comment}</p>
            <button onClick={onShowMountain} className="w-full bg-orange-500 text-white rounded-xl py-2.5 text-sm font-bold">🧗 山のぼりの進捗を見る</button>
            <button onClick={onClose} className="mt-2 text-sm text-slate-400 underline">閉じる</button>
          </div>
        )}
      </div>
    </ModalShell>
  );
}

const WD = ['日', '月', '火', '水', '木', '金', '土'];

function SettingsModal({ settings, setSettings, setmenus, setSetmenus, currentTasks, onClose }) {
  const [limit, setLimit] = useState(settings.limit);
  const [dayStart, setDayStart] = useState(settings.dayStart);
  const recurring = settings.recurringFixed || [];

  const saveSettings = () => setSettings((s) => ({ ...s, limit, dayStart }));

  // くりかえし固定予定の編集（即時反映）
  const updateRecurring = (next) => setSettings((s) => ({ ...s, recurringFixed: next }));
  const addRecurring = () => updateRecurring([...recurring, { id: 'rf_' + Date.now(), name: '習い事', start: '17:00', end: '18:00', days: [2, 4] }]);
  const editRecurring = (id, patch) => updateRecurring(recurring.map((r) => (r.id === id ? { ...r, ...patch } : r)));
  const removeRecurring = (id) => updateRecurring(recurring.filter((r) => r.id !== id));
  const toggleDay = (id, d) => {
    const r = recurring.find((x) => x.id === id);
    const days = r.days.includes(d) ? r.days.filter((x) => x !== d) : [...r.days, d].sort();
    editRecurring(id, { days });
  };

  // 現在の並びをセットメニューとして保存（confirmed #10: あとで自分で編集）
  const saveAsSet = (name) => {
    const def = currentTasks
      .filter((t) => t.type !== 'fixed')
      .map((t) => t.type === 'rest' ? { t: 'rest', m: t.plannedMin } : { t: 'study', c: t.cat, n: t.name, min: t.plannedMin });
    if (def.length === 0) { alert('保存するタスクがありません。'); return; }
    setSetmenus({ ...setmenus, [name]: def });
    alert(`「${name}」を現在の${def.length}ブロックで上書きしました。`);
  };

  return (
    <ModalShell title="設定" onClose={onClose}>
      <div className="space-y-4">
        <div>
          <h3 className="font-bold text-sm mb-2">1日の区切り</h3>
          <label className="flex items-center justify-between text-sm mb-2">
            <span className="text-slate-500">開始時刻</span>
            <input type="time" value={dayStart.padStart(5,'0')} onChange={(e) => setDayStart(e.target.value)} className="border rounded-lg px-2 py-1.5" />
          </label>
          <label className="flex items-center justify-between text-sm">
            <span className="text-slate-500">リミット（これ以降は短縮・消滅）</span>
            <select value={limit} onChange={(e) => setLimit(e.target.value)} className="border rounded-lg px-2 py-1.5">
              <option value="24:00">24:00</option>
              <option value="25:00">25:00（深夜1時）</option>
              <option value="26:00">26:00（深夜2時）</option>
              <option value="27:00">27:00（深夜3時）</option>
            </select>
          </label>
          <button onClick={saveSettings} className="w-full bg-orange-500 text-white rounded-lg py-2 text-sm font-bold mt-3">設定を保存</button>
        </div>

        <div className="border-t pt-4">
          <h3 className="font-bold text-sm mb-1">くりかえし固定予定</h3>
          <p className="text-xs text-slate-400 mb-3">学校・習い事など。選んだ曜日に毎日自動で入ります（学校は月〜金なので土日は出ません）。</p>
          <div className="space-y-3">
            {recurring.map((r) => (
              <div key={r.id} className="bg-purple-50 rounded-xl p-3">
                <div className="flex items-center gap-2 mb-2">
                  <input value={r.name} onChange={(e) => editRecurring(r.id, { name: e.target.value })} className="flex-1 border rounded-lg px-2 py-1.5 text-sm" />
                  <button onClick={() => removeRecurring(r.id)} className="text-slate-400 text-sm px-2">削除</button>
                </div>
                <div className="flex items-center gap-2 mb-2">
                  <input type="time" value={r.start} onChange={(e) => editRecurring(r.id, { start: e.target.value })} className="border rounded-lg px-2 py-1.5 text-sm flex-1" />
                  <span className="text-slate-400">〜</span>
                  <input type="time" value={r.end} onChange={(e) => editRecurring(r.id, { end: e.target.value })} className="border rounded-lg px-2 py-1.5 text-sm flex-1" />
                </div>
                <div className="flex gap-1">
                  {WD.map((w, d) => (
                    <button key={d} onClick={() => toggleDay(r.id, d)}
                      className={`flex-1 rounded-lg py-1.5 text-xs font-bold ${r.days.includes(d) ? 'bg-purple-500 text-white' : 'bg-white text-slate-300 border'}`}>{w}</button>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <button onClick={addRecurring} className="w-full bg-purple-100 text-purple-700 rounded-lg py-2 text-sm font-bold mt-2">＋ くりかえし予定を追加</button>
        </div>

        <div className="border-t pt-4">
          <h3 className="font-bold text-sm mb-1">セットメニューを編集</h3>
          <p className="text-xs text-slate-400 mb-2">今日のスケジュールの並び（固定予定を除く）を、選んだセットに上書き保存します。</p>
          <div className="grid grid-cols-2 gap-2">
            {Object.keys(setmenus).map((name) => (
              <button key={name} onClick={() => saveAsSet(name)} className="bg-amber-50 border border-amber-200 rounded-lg py-2 text-xs font-bold">「{name}」に保存</button>
            ))}
          </div>
        </div>

        <div className="border-t pt-4 text-xs text-slate-400">
          <p>データはこの端末のブラウザ内（localStorage）にのみ保存されます。</p>
        </div>
      </div>
    </ModalShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
