/* =========================================================================
 *  日付ヘルパー（YYYYMMDD 文字列ベース・TZずれ回避）
 * ========================================================================= */
const pad2 = (n) => String(n).padStart(2, '0');
const toYmd = (y, m, d) => `${y}${pad2(m)}${pad2(d)}`;
const parseYmd = (s) => ({ y: +s.slice(0, 4), m: +s.slice(4, 6), d: +s.slice(6, 8) });
const dowOf = (y, m, d) => new Date(y, m - 1, d).getDay(); // 0=日
const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
const WEEK_JP = ['日', '月', '火', '水', '木', '金', '土'];

function isSummer(m, d) {
  return (m === 7 && d >= 21) || m === 8; // 7/21〜8/31
}

// 振替休日：日曜が祝日なら翌月曜を休みに（範囲内の簡易対応）
function isSubstituteHoliday(s) {
  const { y, m, d } = parseYmd(s);
  if (dowOf(y, m, d) !== 1) return false; // 月曜のみ
  const prev = new Date(y, m - 1, d - 1);
  const ps = toYmd(prev.getFullYear(), prev.getMonth() + 1, prev.getDate());
  return HOLIDAYS.has(ps) && new Date(y, m - 1, d - 1).getDay() === 0;
}
function isHolidayDate(s) {
  return HOLIDAYS.has(s) || isSubstituteHoliday(s);
}

// その日の区分・目標時間・時限数（指示書 §4-1 §4-2 §8）
function dayInfo(s) {
  const { y, m, d } = parseYmd(s);
  const dow = dowOf(y, m, d);
  const weekend = dow === 0 || dow === 6;
  const holiday = isHolidayDate(s);
  if (isSummer(m, d)) return { mode: '夏休み', targetH: 10, slots: 10, rest: true, dow };
  if (weekend || holiday) return { mode: '休日', targetH: 10, slots: 10, rest: true, dow };
  if (dow === 1) return { mode: '月曜', targetH: 5.5, slots: 5, rest: false, dow };
  return { mode: '平日', targetH: 4, slots: 5, rest: false, dow };
}

function todayYmd() {
  const n = new Date();
  return toYmd(n.getFullYear(), n.getMonth() + 1, n.getDate());
}

// その日の予定ラベル（events マップ ＋ dailyLogs.events 両方を統合）
function eventsOf(data, s) {
  const a = (data.events && data.events[s]) || [];
  const b = (data.dailyLogs[s] && data.dailyLogs[s].events) || [];
  return [...a, ...b];
}
function logOf(data, s) {
  return data.dailyLogs[s] || { slots: [], memo: '', events: [] };
}
// 実績分：完了コマは actualMin（記録があれば）優先、無ければ予定 minutes
function actualOf(slot) {
  if (!slot.done) return 0;
  const a = slot.actualMin;
  return (a !== undefined && a !== null && a !== '') ? (+a || 0) : (+slot.minutes || 0);
}
function doneMinutes(log) {
  return (log.slots || []).reduce((a, x) => a + actualOf(x), 0);
}
function plannedMinutes(log) {
  return (log.slots || []).reduce((a, x) => a + (+x.minutes || 0), 0);
}

// 全学習記録を1件ずつのフラットな配列にする（ログ／CSV用）
function allStudyEntries(data, doneOnly) {
  const out = [];
  const logs = data.dailyLogs || {};
  Object.keys(logs).forEach((date) => {
    (logs[date].slots || []).forEach((sl) => {
      if (doneOnly && !sl.done) return;
      out.push({
        date,
        subject: sl.subject,
        menu: sl.menu,
        material: sl.material || '',
        planned: +sl.minutes || 0,
        actual: sl.done ? actualOf(sl) : 0,
        done: !!sl.done,
        note: sl.note || '',
      });
    });
  });
  out.sort((a, b) => a.date.localeCompare(b.date));
  return out;
}

// CSV文字列を生成（Excelで文字化けしないようUTF-8 BOM付き）
function entriesToCsv(entries) {
  const head = ['日付', '曜日', '科目', 'メニュー', '教材・単元', '予定(分)', '実績(分)', '完了', 'メモ'];
  const esc = (v) => { v = String(v == null ? '' : v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  const rows = entries.map((e) => {
    const { y, m, d } = parseYmd(e.date);
    return [`${y}/${pad2(m)}/${pad2(d)}`, WEEK_JP[dowOf(y, m, d)], e.subject, e.menu, e.material, e.planned, e.actual, e.done ? '○' : '', e.note].map(esc).join(',');
  });
  const BOM = String.fromCharCode(0xFEFF);
  return BOM + [head.join(','), ...rows].join('\r\n');
}
function downloadCsv(filename, text) {
  const blob = new Blob([text], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ドラッグ＆ドロップ並べ替え（依存ライブラリなし・マウス/タッチ両対応）
// render(item, index, gripProps, isDragging) を渡す。gripProps を「つまみ(≡)」に展開する。
function DragList({ items, onReorder, render, className }) {
  const [order, setOrder] = useState(items);
  const [dragItem, setDragItem] = useState(null);
  const ref = useRef(null);
  const orderRef = useRef(order);
  useEffect(() => { orderRef.current = order; }); // 最新の並びをrefに保持
  useEffect(() => { if (!dragItem) setOrder(items); }, [items, dragItem]);

  useEffect(() => {
    if (!dragItem) return;
    const onMove = (e) => {
      const y = e.clientY != null ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : null);
      if (y == null || !ref.current) return;
      const rows = [...ref.current.querySelectorAll('[data-drag-row]')];
      let target = rows.length - 1;
      for (let k = 0; k < rows.length; k++) { const r = rows[k].getBoundingClientRect(); if (y < r.top + r.height / 2) { target = k; break; } }
      setOrder((o) => {
        const from = o.indexOf(dragItem);
        if (from === -1 || from === target) return o;
        const a = [...o]; const [m] = a.splice(from, 1); a.splice(target, 0, m); return a;
      });
    };
    const onUp = () => { onReorder(orderRef.current); setDragItem(null); };
    document.addEventListener('pointermove', onMove, { passive: false });
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
    return () => { document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); document.removeEventListener('pointercancel', onUp); };
  }, [dragItem, onReorder]);

  const gripFor = (item) => ({
    onPointerDown: (e) => { e.preventDefault(); setDragItem(item); },
    style: { touchAction: 'none', cursor: 'grab' },
    'aria-label': '並べ替え（ドラッグ）',
  });

  return (
    <div ref={ref} className={className}>
      {order.map((item, index) => (
        <div key={index} data-drag-row>
          {render(item, index, gripFor(item), dragItem === item)}
        </div>
      ))}
    </div>
  );
}

function CalendarScreen({ data, setData, go }) {

    const y = t.y, m = t.m;
    const inRange = (y > RANGE.startY || (y === RANGE.startY && m >= RANGE.startM)) &&
                    (y < RANGE.endY || (y === RANGE.endY && m <= RANGE.endM));
    return inRange ? { y, m } : { y: RANGE.startY, m: RANGE.startM };
  })();
  const [cur, setCur] = useState(initial);
  const today = todayYmd();
  const swipe = useRef(null); // スワイプ判定用 {x,y}

  const canPrev = cur.y > RANGE.startY || (cur.y === RANGE.startY && cur.m > RANGE.startM);
  const canNext = cur.y < RANGE.endY || (cur.y === RANGE.endY && cur.m < RANGE.endM);
  const move = (delta) => {
    let m = cur.m + delta, y = cur.y;
    if (m < 1) { m = 12; y--; }
    if (m > 12) { m = 1; y++; }
    setCur({ y, m });
  };

  // グリッド（月曜始まり：月火水木金土日）
  const cells = useMemo(() => {
    const dim = daysInMonth(cur.y, cur.m);
    const firstDow = dowOf(cur.y, cur.m, 1);

    const arr = [];
    for (let i = 0; i < lead; i++) arr.push(null);
    for (let d = 1; d <= dim; d++) arr.push(toYmd(cur.y, cur.m, d));
    while (arr.length % 7 !== 0) arr.push(null);
    return arr;
  }, [cur]);

  // 今月サマリー
  const summary = useMemo(() => {
    let goalToToday = 0, goalMonth = 0, actual = 0;
    cells.forEach((s) => {
      if (!s) return;
      const tg = dayInfo(s).targetH;
      goalMonth += tg;
      if (s <= today) goalToToday += tg; // 今日までの累計目標（#G）
      actual += doneMinutes(logOf(data, s)) / 60;
    });
    return { goalToToday, goalMonth, actual };
  }, [cells, data, today]);

  return (
    <div className="max-w-3xl mx-auto px-3 pb-24">
      <Header title="月間カレンダー" data={data} setData={setData} />
      <NavTabs current="cal" go={go} />

      {/* 今日のメニューへ（#4） */}
      <button onClick={() => go('#/day/' + today)}
        className="w-full mt-3 mb-2 py-2.5 rounded-xl bg-teal text-navy font-bold active:bg-teal-600">
        ▶ 今日（{t.m}/{t.d}）のメニュー
      </button>

      {/* 月ナビ */}
      <div className="flex items-center justify-between mb-2">
        <button onClick={() => move(-1)} disabled={!canPrev}
          className={'w-12 h-12 text-2xl rounded-xl ' + (canPrev ? 'bg-navy-600 active:bg-navy-500' : 'opacity-30')}>‹</button>
        <div className="text-center">
          <div className="text-xl font-bold">{cur.y}年 {cur.m}月</div>
          {!(cur.y === t.y && cur.m === t.m)
            ? <button onClick={() => setCur({ y: t.y, m: t.m })} className="text-xs text-teal underline">今日の月へ</button>
            : <div className="text-xs text-teal">{quipOf(cur.y + '-' + cur.m)}</div>}
        </div>
        <button onClick={() => move(1)} disabled={!canNext}
          className={'w-12 h-12 text-2xl rounded-xl ' + (canNext ? 'bg-navy-600 active:bg-navy-500' : 'opacity-30')}>›</button>
      </div>

      {/* 今月サマリー（今日までの累計目標と比較 #G） */}
      <div className="bg-navy-700 rounded-xl px-4 py-2 mb-3 text-sm">
        <div className="flex items-center gap-2 mb-1">
          <span className="text-slate-300">実績</span>
          <span className="font-bold tabnum text-teal">{summary.actual.toFixed(1)}h</span>
          <span className="text-slate-500">/ 今日まで目標 {summary.goalToToday.toFixed(0)}h</span>
          <span className="text-slate-600 text-xs ml-auto">月合計 {summary.goalMonth.toFixed(0)}h</span>
        </div>
        <ProgressBar ratio={summary.goalToToday ? summary.actual / summary.goalToToday : 0} />
      </div>

      {/* 曜日ヘッダ */}
      <div className="grid grid-cols-7 gap-1 mb-1 text-center text-xs">
        {['月', '火', '水', '木', '金', '土', '日'].map((w, i) => (
          <div key={w} className={'py-1 font-medium ' + (i === 5 ? 'text-sky-300' : i === 6 ? 'text-rose-300' : 'text-slate-400')}>{w}</div>
        ))}
      </div>

      {/* 日付セル（スワイプで前月・翌月へ） */}
      <div className="grid grid-cols-7 gap-1"
        onTouchStart={(e) => { swipe.current = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }}
        onTouchEnd={(e) => {
          if (!swipe.current) return;
          const dx = e.changedTouches[0].clientX - swipe.current.x;
          const dy = e.changedTouches[0].clientY - swipe.current.y;
          swipe.current = null;
          if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
            if (dx < 0 && canNext) move(1);
            else if (dx > 0 && canPrev) move(-1);
          }
        }}>
        {cells.map((s, idx) => {
          if (!s) return <div key={idx} className="aspect-square sm:aspect-auto sm:h-24" />;
          const { d } = parseYmd(s);
          const info = dayInfo(s);
          const log = logOf(data, s);
          const ev = eventsOf(data, s);
          const done = doneMinutes(log) / 60;
          const ratio = info.targetH ? done / info.targetH : 0;
          const isToday = s === today;
          const isSat = info.dow === 6, isSun = info.dow === 0 || isHolidayDate(s);
          return (
            <button key={s} onClick={() => go('#/day/' + s)}
              className={'relative text-left rounded-lg p-1 flex flex-col gap-0.5 aspect-square sm:aspect-auto sm:h-24 border transition '
                + (isToday ? 'border-teal bg-navy-600 ' : 'border-navy-600 ')
                + (isSun ? 'bg-rose-500/10 ' : isSat ? 'bg-sky-500/10 ' : 'bg-navy-700 ')
                + 'active:bg-navy-500'}>
              <div className="flex items-center">
                <span className={'text-xs font-bold ' + (isToday ? 'text-teal' : isSun ? 'text-rose-300' : isSat ? 'text-sky-300' : 'text-slate-200')}>{d}</span>
              </div>
              {/* 予定ラベル：日にちの下に小さく表示（修正版ver2 #4・モバイルも表示） */}
              <div className="flex-1 overflow-hidden space-y-0.5">
                {ev.slice(0, 2).map((label, i) => (
                  <div key={i} className="text-[8px] sm:text-[9px] leading-tight truncate px-1 rounded bg-teal/20 text-teal-100" title={label}>{label}</div>
                ))}
                {ev.length > 2 && <div className="text-[8px] text-slate-400 px-1 leading-tight">+{ev.length - 2}</div>}
              </div>
              {/* 目標 / 実績 */}
              <div className="text-[9px] tabnum text-slate-400 leading-none">
                {done > 0 ? <span className="text-teal font-semibold">{done.toFixed(1)}</span> : <span className="text-slate-500">0</span>}
                <span className="text-slate-600">/{info.targetH}h</span>
              </div>
              <ProgressBar ratio={ratio} height={4} />
            </button>
          );
        })}
      </div>

      {/* 今月の予定一覧（モバイルでも読める・#1） */}
      {(() => {
        const list = cells.filter(Boolean).flatMap((s) => eventsOf(data, s).map((label) => ({ s, label })));
        if (list.length === 0) return null;
        return (
          <div className="mt-4">
            <div className="text-xs font-bold text-teal mb-1 px-1">📌 {cur.m}月の予定</div>
            <div className="bg-navy-700 rounded-xl divide-y divide-navy-600">
              {list.map((e, i) => {
                const { m, d } = parseYmd(e.s);
                return (
                  <button key={i} onClick={() => go('#/day/' + e.s)} className="w-full flex items-center gap-2 px-3 py-2 text-left text-sm active:bg-navy-600">
                    <span className="tabnum text-slate-400 w-12 shrink-0">{m}/{d}（{WEEK_JP[dowOf(parseYmd(e.s).y, m, d)]}）</span>
                    <span className="flex-1">{e.label}</span>
                    <span className="text-slate-500 text-xs">›</span>
                  </button>
                );
              })}
            </div>
          </div>
        );
      })()}

      <p className="text-xs text-slate-500 mt-4 text-center">
        日付をタップ → その日のメニュー・予定を編集 ／ カレンダーを左右スワイプで月移動
      </p>
    </div>
  );
}

/* =========================================================================
 *  日別メニュー画面（指示書 §4-2）
 * ========================================================================= */
function DayScreen({ data, setData, date, go }) {
  const { y, m, d } = parseYmd(date);
  const info = dayInfo(date);
  const setMenus = data.setMenus || SET_MENUS;
  const setMenuNames = Object.keys(setMenus);
  const baseSetName = defaultSetFor(info, setMenus);
  const saved = data.dailyLogs[date];
  const isUnsaved = !saved || !saved.slots;
  // 保存が無い日は、その日の基本メニューを既定表示する（修正版ver2 #1）
  const slots = isUnsaved ? slotsFromArr(setMenus[baseSetName] || []) : saved.slots;
  const memo = (saved && saved.memo) || '';

  const setSlots = (updater) => {
    const base = slots; // 表示中のコマ（未保存日は基本メニュー）を起点に編集
    const next = typeof updater === 'function' ? updater(base) : updater;
    const renum = next.map((s, i) => ({ ...s, slotNumber: i + 1 }));
    setData((prev) => {
      const cur = prev.dailyLogs[date] || { memo: '', events: [] };
      return {
        ...prev,
        dailyLogs: {
          ...prev.dailyLogs,
          [date]: { ...cur, slots: renum, totalMinutes: renum.reduce((a, x) => a + actualOf(x), 0) },
        },
      };
    });
  };
  const setMemo = (v) => setData((prev) => {
    const cur = prev.dailyLogs[date] || { events: [] };
    return { ...prev, dailyLogs: { ...prev.dailyLogs, [date]: { ...cur, slots: cur.slots || slots, memo: v } } };
  });

  const updateSlot = (i, patch) => setSlots((arr) => arr.map((s, idx) => (idx === i ? { ...s, ...patch } : s)));
  const addSlot = () => setSlots((arr) => [...arr, slotFromMenu(arr.length, '英語', MENU_MASTER['英語'][0].name)]);
  const removeSlot = (i) => setSlots((arr) => arr.filter((_, idx) => idx !== i));
  const move = (i, dir) => setSlots((arr) => {
    const j = i + dir;
    if (j < 0 || j >= arr.length) return arr;
    const copy = [...arr];
    [copy[i], copy[j]] = [copy[j], copy[i]];
    return copy;
  });

  const [applyName, setApplyName] = useState(() => baseSetName);
  const applySet = () => {
    if (!isUnsaved && slots.length > 0 && !window.confirm('現在のコマを上書きして基本メニューを適用しますか？')) return;
    setSlots(slotsFromArr(setMenus[applyName]));
  };
  const appendSet = () => setSlots((arr) => [...arr, ...slotsFromArr(setMenus[applyName])]);

  // 詳細編集の開閉（コマ番号で管理）
  const [expandedSlot, setExpandedSlot] = useState(null);
  // 予定（日別画面で追加・削除できるように）
  const [eventInput, setEventInput] = useState('');
  const [eventAdding, setEventAdding] = useState(false);
  const dayEvents = (data.events && data.events[date]) || [];
  const addEvent = () => {
    const v = eventInput.trim(); if (!v) return;
    setData((prev) => ({ ...prev, events: { ...prev.events, [date]: [...((prev.events && prev.events[date]) || []), v] } }));
    setEventInput('');
  };
  const removeEvent = (idx) => setData((prev) => {
    const arr = [...((prev.events && prev.events[date]) || [])]; arr.splice(idx, 1);
    return { ...prev, events: { ...prev.events, [date]: arr } };
  });

  const done = doneMinutes({ slots });
  const planned = plannedMinutes({ slots });
  const goalMin = info.targetH * 60;
  const ratio = goalMin ? done / goalMin : 0;

  return (
    <div className="max-w-2xl mx-auto px-3 pb-40">
      <div className="flex items-center gap-2 pt-3">
        <button onClick={() => go('#/')} className="px-3 py-2 rounded-lg bg-navy-600 active:bg-navy-500 text-sm">‹ カレンダー</button>
        <div className="flex-1" />
      </div>

      <div className="mt-2 mb-1">
        <h1 className="text-2xl font-black">{m}月{d}日<span className="text-base font-bold ml-1">（{WEEK_JP[dowOf(y, m, d)]}）</span></h1>
        <div className="flex items-center gap-2 text-xs mt-1">
          <span className="px-2 py-0.5 rounded-full bg-navy-600 text-slate-300">{info.mode}モード</span>
          <span className="text-slate-400">目標 {info.targetH}h{isUnsaved ? '・基本メニュー表示中' : ''}</span>
        </div>
      </div>

      {/* 予定（この画面で追加・削除できる） */}
      <div className="flex flex-wrap items-center gap-1.5 mb-3">
        {dayEvents.map((e, i) => (
          <span key={i} className="flex items-center gap-1 text-xs pl-2 pr-1 py-1 rounded-full bg-teal/20 text-teal-100 border border-teal/30">
            📌 {e}
            <button onClick={() => removeEvent(i)} className="w-5 h-5 flex items-center justify-center rounded-full text-rose-200 active:bg-rose-500/30" aria-label="予定を削除">✕</button>
          </span>
        ))}
        {eventAdding ? (
          <span className="flex items-center gap-1">
            <input autoFocus value={eventInput} onChange={(e) => setEventInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') { addEvent(); } }}
              onBlur={() => { addEvent(); setEventAdding(false); }}
              placeholder="例：英検 / 定期テスト"
              className="bg-navy-600 rounded-full px-3 h-8 text-xs outline-none focus:ring-1 focus:ring-teal w-40" />
          </span>
        ) : (
          <button onClick={() => setEventAdding(true)} className="text-xs px-3 h-8 rounded-full bg-navy-600 text-slate-300 active:bg-navy-500">＋ 予定</button>
        )}
      </div>

      {/* セットメニュー */}
      <div className="bg-navy-700 rounded-xl p-3 mb-3">
        <div className="text-xs text-slate-400 mb-1">セットメニュー（1クリックで一括設定）</div>
        <div className="flex flex-wrap gap-2 items-center">
          <select value={applyName} onChange={(e) => setApplyName(e.target.value)}
            className="bg-navy-600 rounded-lg px-2 py-1.5 text-sm outline-none flex-1 min-w-[140px]">
            {setMenuNames.map((n) => <option key={n} value={n}>{n}（{setMenus[n].length}コマ）</option>)}
          </select>
          <button onClick={applySet} className="bg-teal text-navy font-bold px-3 py-1.5 rounded-lg text-sm active:bg-teal-600">適用</button>
          <button onClick={appendSet} className="bg-navy-600 px-3 py-1.5 rounded-lg text-sm active:bg-navy-500">追加</button>
        </div>
      </div>

      {/* コマ一覧 */}
      <div className="space-y-2">
        {slots.length === 0 && (
          <div className="text-center text-slate-500 py-8 text-sm">
            まだコマがありません。<br />セットメニューを「適用」するか、下の「＋コマを追加」から始めよう。
          </div>
        )}
        <DragList items={slots} className="space-y-2" onReorder={(arr) => { setSlots(arr); setExpandedSlot(null); }}
          render={(s, i, grip, dragging) => {
          const menus = MENU_MASTER[s.subject] || [];
          const open = expandedSlot === i;
          const toggleDone = () => {
            const done = !s.done;
            const patch = { done };
            if (done && (s.actualMin === undefined || s.actualMin === null || s.actualMin === '')) patch.actualMin = s.minutes;
            updateSlot(i, patch);
          };
          return (
            <div className={'rounded-xl border ' + (s.done ? 'bg-emerald-900/20 border-emerald-600/40' : 'bg-navy-700 border-navy-600') + (dragging ? ' opacity-80 ring-2 ring-teal shadow-lg' : '')}>
              {/* 通常表示：大きな完了トグル＋メニュー（タップで詳細）＋つまみ(≡) */}
              <div className="flex items-stretch">
                <button onClick={toggleDone} aria-label="完了切替"
                  className={'w-12 shrink-0 flex items-center justify-center text-xl rounded-l-xl ' + (s.done ? 'bg-emerald-500 text-white' : 'bg-navy-600 text-slate-500 active:bg-navy-500')}>
                  {s.done ? '✓' : '○'}
                </button>
                <button onClick={() => setExpandedSlot(open ? null : i)}
                  className="flex-1 min-w-0 text-left flex items-center gap-2 px-2 py-2.5 active:bg-navy-600/40">
                  <SubjectDot subject={s.subject} />
                  <span className="min-w-0 flex-1">
                    <span className="block text-sm truncate">{s.menu || '（メニュー未設定）'}</span>
                    {s.material ? <span className="block text-[11px] text-slate-400 truncate">{s.material}</span> : null}
                  </span>
                  <span className="text-[11px] text-slate-400 shrink-0">{open ? '閉じる ▲' : '詳細 ▼'}</span>
                </button>
                <div {...grip} className="w-10 shrink-0 flex items-center justify-center text-slate-500 text-lg select-none active:bg-navy-600/40 rounded-r-xl">≡</div>
              </div>

              {/* 完了時：実績分（よく使うので通常時に表示） */}
              {s.done && (
                <div className="flex items-center gap-2 px-3 pb-2 text-sm">
                  <span className="text-emerald-300 text-xs">実績</span>
                  <div className="flex items-center bg-emerald-900/30 border border-emerald-600/40 rounded-lg px-2 h-9">
                    <NumInput value={s.actualMin !== undefined && s.actualMin !== null && s.actualMin !== '' ? s.actualMin : s.minutes}
                      onChange={(v) => updateSlot(i, { actualMin: v })}
                      className="w-14 bg-transparent text-right outline-none tabnum text-emerald-200" />
                    <span className="text-xs text-emerald-300 ml-1">分</span>
                  </div>
                  <span className="text-xs text-slate-500">（予定 {s.minutes || 0}分）</span>
                </div>
              )}

              {/* メモ（よく使うので通常時に表示） */}
              <div className="px-3 pb-3">
                <input value={s.note} onChange={(e) => updateSlot(i, { note: e.target.value })} placeholder="メモ"
                  className="w-full bg-navy-600/60 rounded-lg px-3 h-9 text-sm outline-none" />
              </div>

              {/* 詳細編集（折りたたみ） */}
              {open && (
                <div className="px-3 pb-3 pt-1 border-t border-navy-600 space-y-2">
                  <div className="flex items-center gap-2">
                    <span className="text-[11px] text-slate-400 w-12 shrink-0">{i + 1}コマ目</span>
                    <select value={s.subject}
                      onChange={(e) => { const sub = e.target.value; const first = (MENU_MASTER[sub][0] || {}).name || ''; updateSlot(i, { subject: sub, menu: first, minutes: menuMin(sub, first) }); }}
                      className="bg-navy-600 rounded-lg px-2 h-9 text-sm outline-none">
                      {SUBJECTS.map((x) => <option key={x} value={x}>{x}</option>)}
                    </select>
                    <div className="flex items-center bg-navy-600 rounded-lg px-2 h-9 ml-auto">
                      <span className="text-[10px] text-slate-500 mr-1">予定</span>
                      <NumInput value={s.minutes} onChange={(v) => updateSlot(i, { minutes: v })}
                        className="w-12 bg-transparent text-right text-sm outline-none tabnum" />
                      <span className="text-xs text-slate-400 ml-1">分</span>
                    </div>
                  </div>
                  {s.subject === 'その他' ? (
                    <input value={s.menu} onChange={(e) => updateSlot(i, { menu: e.target.value })} placeholder="メニュー名"
                      className="w-full bg-navy-600 rounded-lg px-2 h-9 text-sm outline-none" />
                  ) : (
                    <select value={s.menu} onChange={(e) => updateSlot(i, { menu: e.target.value, minutes: menuMin(s.subject, e.target.value) })}
                      className="w-full bg-navy-600 rounded-lg px-2 h-9 text-sm outline-none">
                      {!menus.find((mm) => mm.name === s.menu) && <option value={s.menu}>{s.menu}</option>}
                      {menus.map((mm) => <option key={mm.name} value={mm.name}>{mm.name}（{mm.min}分）</option>)}
                    </select>
                  )}
                  <input value={s.material} onChange={(e) => updateSlot(i, { material: e.target.value })}
                    placeholder="教材・単元名（例：Rule3 lesson4）"
                    className="w-full bg-navy-600 rounded-lg px-2 h-9 text-sm outline-none" />
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] text-slate-500">並べ替えは右の ≡ をドラッグ</span>
                    <div className="flex-1" />
                    <button onClick={() => { removeSlot(i); setExpandedSlot(null); }} className="px-3 h-10 rounded-lg bg-rose-500/20 text-rose-200 text-sm active:bg-rose-500/30">このコマを削除</button>
                  </div>
                </div>
              )}
            </div>
          );
        }} />
      </div>

      <button onClick={addSlot} className="w-full mt-3 py-2.5 rounded-xl border border-dashed border-navy-500 text-slate-300 active:bg-navy-700">＋ コマを追加</button>

      {/* 1日メモ */}
      <textarea value={memo} onChange={(e) => setMemo(e.target.value)} placeholder="今日のひとことメモ"
        className="w-full mt-3 bg-navy-700 rounded-xl px-3 py-2 text-sm outline-none resize-none" rows={2} />

      {/* 合計フッタ（固定） */}
      <div className="fixed bottom-0 left-0 right-0 bg-navy-700/95 backdrop-blur border-t border-navy-600 px-4 py-2">
        <div className="max-w-2xl mx-auto">
          <div className="flex items-center justify-between text-sm mb-1">
            <span>本日の実績 <span className="font-black text-teal tabnum text-base">{(done / 60).toFixed(1)}</span> / 目標 {info.targetH}h
              <span className="text-slate-500 text-xs ml-2">（予定 {(planned / 60).toFixed(1)}h）</span>
            </span>
            <span className="tabnum text-sm font-bold" style={{ color: ratio >= 1 ? '#22c55e' : '#2ec4b6' }}>{Math.round(ratio * 100)}%</span>
          </div>
          <ProgressBar ratio={ratio} height={8} />
          {ratio >= 1 && <div className="text-center text-xs text-emerald-300 mt-1">目標達成！今日もよく頑張った🎉</div>}
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
 *  ヘッダ（エクスポート / インポート）
 * ========================================================================= */
function Header({ title, data, setData }) {
  const fileRef = useRef(null);
  const exportJson = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `study-backup-${todayYmd()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const importJson = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const obj = JSON.parse(r.result);
        if (!obj.dailyLogs) throw new Error('形式が不正です');
        if (!obj.events) obj.events = {};
        if (!obj.settings) obj.settings = { activeSetMenu: '通常（平日）' };
        setData(obj);
        alert('インポートしました');
      } catch (err) {
        alert('読み込みに失敗：' + err.message);
      }
    };
    r.readAsText(f);
    e.target.value = '';
  };
  const [menuOpen, setMenuOpen] = useState(false);
  const navTo = (p) => { setMenuOpen(false); location.hash = p; window.scrollTo(0, 0); };

/* =========================================================================
 *  週間スケジュール画面（指示書 §4-3）
 * ========================================================================= */
function WeeklyScreen({ data, setData, go }) {
  const [plan, setPlan] = useState('通常週');
  const [pointsOpen, setPointsOpen] = useState(false);
  const P = WEEKLY_PLANS[plan];
  const rowTotal = (h) => h.reduce((a, b) => a + b, 0);
  const colTotal = (rows, i) => rows.reduce((a, r) => a + r.h[i], 0);
  const grand = (rows) => rows.reduce((a, r) => a + rowTotal(r.h), 0);

  // 今週（月〜日）の日付
  const weekDates = useMemo(() => {
    const t = parseYmd(todayYmd());
    const base = new Date(t.y, t.m - 1, t.d);
    const monOffset = (base.getDay() + 6) % 7;
    const mon = new Date(base); mon.setDate(base.getDate() - monOffset);
    return WEEK_DAYS.map((_, i) => { const d = new Date(mon); d.setDate(mon.getDate() + i); return toYmd(d.getFullYear(), d.getMonth() + 1, d.getDate()); });
  }, []);

  // 今週の実績（科目別 完了分数→時間）
  const actualBySub = useMemo(() => {
    const acc = { 英語: 0, 世界史: 0, 現代文: 0, 古文: 0, その他: 0 };
    weekDates.forEach((s) => {
      (logOf(data, s).slots || []).forEach((sl) => {
        acc[sl.subject] = (acc[sl.subject] || 0) + actualOf(sl);
      });
    });
    Object.keys(acc).forEach((k) => acc[k] = acc[k] / 60);
    return acc;
  }, [weekDates, data]);

  const planBySub = useMemo(() => {
    const acc = {};
    P.rows.forEach((r) => { acc[r.sub] = (acc[r.sub] || 0) + rowTotal(r.h); });
    return acc;
  }, [plan]);

  const planTotal = grand(P.rows);
  const actualTotal = Object.values(actualBySub).reduce((a, b) => a + b, 0);
  const wd0 = parseYmd(weekDates[0]), wd6 = parseYmd(weekDates[6]);

  return (
    <div className="max-w-3xl mx-auto px-3 pb-24">
      <Header title="週間スケジュール" data={data} setData={setData} />
      <NavTabs current="weekly" go={go} />

      {/* 合格のためのポイント（修正版ver2 #2） */}
      <div className="rounded-xl bg-gradient-to-r from-teal/15 to-navy-700 border border-teal/30 overflow-hidden mt-3">
        <button onClick={() => setPointsOpen((v) => !v)} className="w-full flex items-center gap-2 px-3 py-2.5 text-left active:bg-navy-600">
          <span className="text-base">🏆</span>
          <span className="flex-1 text-sm font-bold text-teal-100">合格のためのポイント：{PASS_POINTS.title}</span>
          <span className="text-xs text-slate-400" style={{ transform: pointsOpen ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▶</span>
        </button>
        {pointsOpen && (
          <div className="px-3 pb-3 space-y-1.5">
            <p className="text-xs text-slate-300">１．{PASS_POINTS.title}</p>
            {PASS_POINTS.items.map((p, i) => (
              <div key={i} className="bg-navy-600 rounded-lg px-2.5 py-1.5">
                <div className="text-xs font-bold text-teal-200 mb-0.5">{p.sub}</div>
                <div className="text-[11px] leading-snug text-slate-200">{p.text}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* プランタブ */}
      <div className="flex gap-1 my-3">
        {WEEKLY_PLAN_NAMES.map((n) => (
          <button key={n} onClick={() => setPlan(n)}
            className={'flex-1 text-xs py-1.5 rounded-lg font-medium ' + (plan === n ? 'bg-teal text-navy' : 'bg-navy-700 text-slate-300 active:bg-navy-600')}>{n}</button>
        ))}
      </div>

      {/* 今週の計画 vs 実績（科目別） */}
      <div className="bg-navy-700 rounded-xl p-3 mb-3">
        <div className="flex items-center justify-between text-sm mb-2">
          <span className="font-bold">今週 {wd0.m}/{wd0.d}〜{wd6.m}/{wd6.d}</span>
          <span className="text-xs text-slate-400">計画 <span className="text-slate-200 font-bold tabnum">{planTotal}</span>h / 実績 <span className="text-teal font-bold tabnum">{actualTotal.toFixed(1)}</span>h</span>
        </div>
        <div className="space-y-1.5">
          {COMPARE_SUBJECTS.map((sub) => {
            const pl = planBySub[sub] || 0, ac = actualBySub[sub] || 0;
            return (
              <div key={sub} className="flex items-center gap-2 text-xs">
                <span className="w-12 shrink-0 flex items-center gap-1"><SubjectDot subject={sub} />{sub}</span>
                <div className="flex-1"><ProgressBar ratio={pl ? ac / pl : 0} height={6} /></div>
                <span className="tabnum w-20 text-right text-slate-400"><span className="text-teal">{ac.toFixed(1)}</span>/{pl}h</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* 配分表 */}
      <div className="overflow-x-auto rounded-xl bg-navy-700">
        <table className="w-full text-xs">
          <thead>
            <tr className="text-slate-400">
              <th className="text-left px-2 py-1.5 sticky left-0 bg-navy-700">メニュー</th>
              {WEEK_DAYS.map((w, i) => <th key={w} className={'px-1 py-1.5 ' + (i === 5 ? 'text-sky-300' : i === 6 ? 'text-rose-300' : '')}>{w}</th>)}
              <th className="px-2 py-1.5 text-teal">計</th>
            </tr>
          </thead>
          <tbody>
            {P.rows.map((r) => (
              <tr key={r.name} className="border-t border-navy-600">
                <td className="px-2 py-1.5 sticky left-0 bg-navy-700 flex items-center gap-1"><SubjectDot subject={r.sub === '過去問' ? 'その他' : r.sub} />{r.name}</td>
                {r.h.map((v, i) => <td key={i} className={'text-center tabnum ' + (v ? '' : 'text-slate-600')}>{v || '·'}</td>)}
                <td className="text-center tabnum font-bold text-teal">{rowTotal(r.h)}</td>
              </tr>
            ))}
            <tr className="border-t-2 border-navy-500 font-bold">
              <td className="px-2 py-1.5 sticky left-0 bg-navy-700">計</td>
              {WEEK_DAYS.map((_, i) => <td key={i} className="text-center tabnum">{colTotal(P.rows, i)}</td>)}
              <td className="text-center tabnum text-teal">{planTotal}</td>
            </tr>
          </tbody>
        </table>
      </div>

      {/* サブ勉強（学校・電車） */}
      {P.sub.length > 0 && (
        <div className="mt-3">
          <div className="text-xs font-bold text-teal mb-1 px-1">＜学校・電車でのサブ勉強＞</div>
          <div className="overflow-x-auto rounded-xl bg-navy-700">
            <table className="w-full text-xs">
              <thead>
                <tr className="text-slate-400">
                  <th className="text-left px-2 py-1.5 sticky left-0 bg-navy-700">メニュー</th>
                  {WEEK_DAYS.map((w) => <th key={w} className="px-1 py-1.5">{w}</th>)}
                  <th className="px-2 py-1.5 text-teal">計</th>
                </tr>
              </thead>
              <tbody>
                {P.sub.map((r, idx) => (
                  <tr key={idx} className="border-t border-navy-600">
                    <td className="px-2 py-1.5 sticky left-0 bg-navy-700">{r.name}</td>
                    {r.h.map((v, i) => <td key={i} className={'text-center tabnum ' + (v ? '' : 'text-slate-600')}>{v || '·'}</td>)}
                    <td className="text-center tabnum text-teal">{rowTotal(r.h)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================================

 * ========================================================================= */
function GoalsScreen({ data, setData, go }) {
  const finalActual = data.finalActual || {};
  const scores = data.testScores || {};
  const setFinal = (name, v) => setData((prev) => ({ ...prev, finalActual: { ...prev.finalActual, [name]: v } }));
  const setScore = (key, v) => setData((prev) => ({ ...prev, testScores: { ...prev.testScores, [key]: { ...(prev.testScores && prev.testScores[key]), actual: v } } }));

  // 試験ごとにグループ化
  const examGroups = useMemo(() => {
    const g = {};
    TEST_TARGETS.forEach((t) => { (g[t.exam] = g[t.exam] || []).push(t); });
    return g;
  }, []);

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="目標管理" data={data} setData={setData} />
      <NavTabs current="goals" go={go} />

      {/* 最終目標 */}
      <div className="text-xs font-bold text-teal mt-4 mb-1 px-1">🎯 最終目標</div>
      <div className="space-y-1.5 mb-4">
        {FINAL_GOALS.map((g) => (
          <div key={g.name} className="bg-navy-700 rounded-lg px-3 py-2 flex items-center gap-2">
            <span className="flex-1 text-sm font-medium">{g.name}</span>
            <span className="text-xs text-slate-400">目標 {g.target}</span>
            <input value={finalActual[g.name] || ''} onChange={(e) => setFinal(g.name, e.target.value)}
              placeholder="現在" className="w-20 bg-navy-600 rounded px-2 py-1 text-xs text-right outline-none" />
          </div>
        ))}
      </div>

      {/* テスト目標点 */}
      <div className="text-xs font-bold text-teal mb-1 px-1">📝 テスト目標点・実績</div>
      <div className="space-y-3 mb-4">
        {Object.keys(examGroups).map((exam) => (
          <div key={exam} className="bg-navy-700 rounded-xl overflow-hidden">
            <div className="px-3 py-1.5 text-sm font-bold bg-navy-600">{exam}</div>
            <table className="w-full text-xs">
              <thead>
                <tr className="text-slate-400">
                  <th className="text-left px-3 py-1">科目</th>
                  <th className="px-2 py-1 w-16">目標</th>
                  <th className="px-2 py-1 w-20">実績</th>
                  <th className="px-2 py-1 w-12">達成</th>
                </tr>
              </thead>
              <tbody>
                {examGroups[exam].map((t) => {
                  const key = t.exam + '_' + t.subject;
                  const actual = (scores[key] && scores[key].actual) || '';
                  const num = parseFloat(actual);
                  const hasNum = !isNaN(num);
                  const achieved = hasNum && num >= t.target;
                  return (
                    <tr key={key} className="border-t border-navy-600">
                      <td className="px-3 py-1.5">{t.subject}</td>
                      <td className="px-2 py-1.5 text-center tabnum text-slate-300">{t.target}</td>
                      <td className="px-2 py-1.5 text-center">
                        <input value={actual} onChange={(e) => setScore(key, e.target.value)}
                          placeholder="-" className="w-14 bg-navy-600 rounded px-1.5 py-0.5 text-center text-xs outline-none tabnum" />
                      </td>
                      <td className="px-2 py-1.5 text-center">{actual === '' ? <span className="text-slate-600">-</span> : !hasNum ? <span className="text-slate-500">—</span> : achieved ? '✅' : '❌'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        ))}
      </div>

      {/* 月別到達目標 */}
      <div className="text-xs font-bold text-teal mb-1 px-1">📅 月別到達目標（6〜8月）</div>
      <div className="space-y-2">
        {MONTHLY_GOALS.map((g) => (
          <div key={g.sub} className="bg-navy-700 rounded-xl overflow-hidden">
            <div className="px-3 py-1.5 text-sm font-bold bg-navy-600 flex items-center gap-1"><SubjectDot subject={SUBJECTS.includes(g.sub) ? g.sub : 'その他'} />{g.sub}</div>
            <div className="overflow-x-auto">
              <table className="w-full text-[11px]">
                <thead>
                  <tr className="text-slate-400">

}

/* =========================================================================
 *  英語 進捗管理画面（指示書 §4-4）
 * ========================================================================= */
function EnglishScreen({ data, setData, go }) {
  const [open, setOpen] = useState({}); // material.key -> true で展開（既定折りたたみ）
  const prog = data.englishProgress || {};
  const get = (id) => prog[id] || { status: '未着手', date: null, minutes: 0, score: '', note: '' };

  const update = (id, patch) => setData((prev) => {
    const cur = (prev.englishProgress && prev.englishProgress[id]) || { status: '未着手', date: null, minutes: 0, score: '', note: '' };
    const next = { ...cur, ...patch };
    // 状態を「未着手→着手」に変えたら実施日を今日に
    if (patch.status !== undefined && patch.status !== '未着手' && !cur.date) next.date = todayYmd();
    return { ...prev, englishProgress: { ...prev.englishProgress, [id]: next } };
  });

  const doneOf = (id) => get(id).status !== '未着手';
  const matStat = (mat) => {
    const done = mat.units.filter((u) => doneOf(u.id)).length;
    return { done, total: mat.units.length };
  };

  const overall = useMemo(() => {
    const total = ALL_ENGLISH_UNITS.length;
    const done = ALL_ENGLISH_UNITS.filter((u) => doneOf(u.id)).length;
    const full = ALL_ENGLISH_UNITS.filter((u) => get(u.id).status === '2周目完了').length;
    return { total, done, full, pct: total ? (done / total) * 100 : 0 };
  }, [prog]);

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="英語 進捗" data={data} setData={setData} />
      <NavTabs current="english" go={go} />

      {/* 全体サマリー（ドーナツ＋カテゴリ別） */}
      <div className="bg-navy-700 rounded-xl p-4 my-3 flex items-center gap-4">
        <Donut pct={overall.pct} />
        <div className="flex-1">
          <div className="text-sm">教材 完了率</div>
          <div className="text-xs text-slate-400 mt-1">着手済み <span className="text-teal font-bold tabnum">{overall.done}</span> / {overall.total} 単元</div>
          <div className="text-xs text-slate-400">うち2周目完了 <span className="text-blue-300 font-bold tabnum">{overall.full}</span></div>
        </div>
      </div>

      {/* カテゴリ別 完了数一覧（タップで該当教材を開く #10） */}
      <div className="grid grid-cols-2 gap-1.5 mb-3">
        {ENGLISH_GROUPS.flatMap((g) => g.materials).map((mat) => {
          const { done, total } = matStat(mat);
          return (
            <button key={mat.key} onClick={() => {
                setOpen((o) => ({ ...o, [mat.key]: true }));
                setTimeout(() => { const el = document.getElementById('mat-' + mat.key); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60);
              }}
              className="bg-navy-700 rounded-lg px-2.5 py-1.5 text-left active:bg-navy-600">
              <div className="flex items-center justify-between text-[11px]">
                <span className="truncate">{mat.name}</span>
                <span className="tabnum text-slate-400">{done}/{total}</span>
              </div>
              <ProgressBar ratio={total ? done / total : 0} height={4} />
            </button>
          );
        })}
      </div>

      {/* 教材ごと（グループ見出し→教材カード） */}
      {ENGLISH_GROUPS.map((g) => (
        <div key={g.group} className="mb-3">
          <div className="text-xs font-bold text-teal mb-1 px-1">{g.group}</div>
          <div className="space-y-2">
            {g.materials.map((mat) => {
              const { done, total } = matStat(mat);
              const isOpen = !!open[mat.key];
              return (
                <div key={mat.key} id={'mat-' + mat.key} className="rounded-xl bg-navy-700 overflow-hidden scroll-mt-2">
                  <button onClick={() => setOpen((o) => ({ ...o, [mat.key]: !o[mat.key] }))}
                    className="w-full flex items-center gap-2 px-3 py-2.5 text-left active:bg-navy-600">
                    <span className="text-xs text-slate-400" style={{ transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▶</span>
                    <span className="flex-1 text-sm font-medium">{mat.name}</span>
                    <span className="tabnum text-xs text-slate-400">{done}/{total}</span>
                    <div className="w-16"><ProgressBar ratio={total ? done / total : 0} height={5} /></div>
                  </button>
                  {isOpen && (
                    <div className="px-2 pb-2 space-y-1.5">
                      {mat.units.map((u) => {
                        const p = get(u.id);
                        const col = p.status === '2周目完了' ? '#3b82f6' : p.status === '1周目完了' ? '#22c55e' : '#475569';
                        return (
                          <div key={u.id} className="rounded-lg bg-navy-600 p-2.5" style={{ borderLeft: `4px solid ${col}` }}>
                            <div className="flex items-center gap-2">
                              <span className="flex-1 text-sm">{u.label}</span>

                                className="bg-navy-700 rounded px-1.5 py-1 text-[11px] outline-none">
                                {ENGLISH_STATUS.map((s) => <option key={s} value={s}>{s}</option>)}
                              </select>
                            </div>
                            <div className="flex flex-wrap items-center gap-1.5 mt-2">
                              <div className="flex items-center bg-navy-700 rounded px-1.5">
                                <NumInput value={p.minutes || 0} onChange={(v) => update(u.id, { minutes: v })}

                            </div>
                          </div>

              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* =========================================================================
 *  世界史 進捗管理画面（指示書 §4-5）
 * ========================================================================= */
function HistoryScreen({ data, setData, go }) {
  const [open, setOpen] = useState({}); // chapter -> true で展開（既定は折りたたみ）
  const [filterTarget, setFilterTarget] = useState(false); // 80%未満のみ表示

  const prog = data.historyProgress || {};
  const get = (no) => prog[no] || { mastery: 0, status: '未着手', lastDate: null, usedMaterials: [], note: '' };

  const update = (no, patch) => setData((prev) => {
    const cur = (prev.historyProgress && prev.historyProgress[no]) || { mastery: 0, status: '未着手', lastDate: null, usedMaterials: [], note: '' };
    const next = { ...cur, ...patch };
    // 習熟度を動かしたら最終学習日を今日に
    if (patch.mastery !== undefined && patch.mastery !== cur.mastery) {
      next.lastDate = todayYmd();
      // 80%以上に到達したら状態を「定着」へ自動更新（手動変更は尊重し、引き上げのみ #8）
      if (next.mastery >= 80 && cur.status !== '定着' && patch.status === undefined) next.status = '定着';
    }
    return { ...prev, historyProgress: { ...prev.historyProgress, [no]: next } };
  });
  const toggleMaterial = (no, mat) => {
    const cur = get(no);
    const has = cur.usedMaterials.includes(mat);
    update(no, { usedMaterials: has ? cur.usedMaterials.filter((x) => x !== mat) : [...cur.usedMaterials, mat] });
  };

  // 全体サマリー
  const overall = useMemo(() => {
    const ms = HISTORY_UNITS.map((u) => get(u.no).mastery || 0);
    const avg = ms.reduce((a, b) => a + b, 0) / ms.length;
    const settled = ms.filter((m) => m >= 80).length;
    return { avg, settled };
  }, [prog]);

  const chapters = Object.keys(HISTORY_CHAPTERS).map(Number);

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="世界史 進捗" data={data} setData={setData} />
      <NavTabs current="history" go={go} />

      {/* 全体サマリー */}
      <div className="bg-navy-700 rounded-xl px-4 py-3 my-3">
        <div className="flex items-center justify-between text-sm mb-1">
          <span>全88単元の平均定着度 <span className="font-black tabnum" style={{ color: masteryColor(overall.avg) }}>{Math.round(overall.avg)}%</span></span>
          <span className="text-slate-400 text-xs">80%以上：<span className="text-teal font-bold">{overall.settled}</span>/88</span>
        </div>
        <ProgressBar ratio={overall.avg / 100} />
      </div>

      {/* フィルター */}
      <div className="flex items-center gap-2 mb-2">
        <button onClick={() => setFilterTarget((v) => !v)}
          className={'text-xs px-3 py-1.5 rounded-full border ' + (filterTarget ? 'bg-amber-500/20 border-amber-400/50 text-amber-200' : 'bg-navy-700 border-navy-600 text-slate-300')}>
          🎯 7月末までに80%にしたい単元（80%未満）
        </button>
        <div className="flex-1" />
        <button onClick={() => setOpen(Object.fromEntries(chapters.map((c) => [c, true])))} className="text-xs text-slate-400 px-2 whitespace-nowrap shrink-0">全部開く</button>
        <button onClick={() => setOpen({})} className="text-xs text-slate-400 px-2 whitespace-nowrap shrink-0">全部閉じる</button>
      </div>

      {/* 色の凡例 */}
      <div className="flex gap-3 text-[10px] text-slate-400 mb-2 px-1">
        <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ background: '#ef4444' }} />0-39</span>
        <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ background: '#eab308' }} />40-69</span>
        <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ background: '#22c55e' }} />70-89</span>
        <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ background: '#3b82f6' }} />90-100</span>
      </div>

      {/* 章ごと */}
      <div className="space-y-2">
        {chapters.map((ch) => {
          let units = HISTORY_UNITS.filter((u) => u.ch === ch);
          if (filterTarget) units = units.filter((u) => (get(u.no).mastery || 0) < 80);
          if (filterTarget && units.length === 0) return null;
          const all = HISTORY_UNITS.filter((u) => u.ch === ch);
          const avg = all.reduce((a, u) => a + (get(u.no).mastery || 0), 0) / all.length;
          const isOpen = !!open[ch];
          return (
            <div key={ch} className="rounded-xl bg-navy-700 overflow-hidden">
              <button onClick={() => setOpen((o) => ({ ...o, [ch]: !o[ch] }))}
                className="w-full flex items-center gap-2 px-3 py-2.5 text-left active:bg-navy-600">
                <span className="text-xs text-slate-400 transition-transform" style={{ transform: isOpen ? 'rotate(90deg)' : 'none' }}>▶</span>
                <span className="text-xs font-bold text-slate-400 w-9">{ch}章</span>
                <span className="flex-1 text-sm font-medium truncate">{HISTORY_CHAPTERS[ch]}</span>
                <span className="tabnum text-xs font-bold w-9 text-right" style={{ color: masteryColor(avg) }}>{Math.round(avg)}%</span>
                <div className="w-16"><ProgressBar ratio={avg / 100} height={5} /></div>
              </button>

              {isOpen && (
                <div className="px-2 pb-2 space-y-1.5">
                  {units.map((u) => {
                    const p = get(u.no);
                    const col = masteryColor(p.mastery || 0);
                    return (
                      <div key={u.no} className="rounded-lg bg-navy-600 p-2.5" style={{ borderLeft: `4px solid ${col}` }}>
                        <div className="flex items-start gap-2">
                          <span className="text-[11px] font-bold text-slate-400 mt-0.5 w-6 shrink-0">{u.no}</span>
                          <span className="flex-1 text-sm leading-snug">{u.title}</span>
                          <span className="tabnum text-sm font-black shrink-0" style={{ color: col }}>{p.mastery || 0}%</span>
                        </div>
                        {/* 習熟度スライダー */}
                        <input type="range" min="0" max="100" step="5" value={p.mastery || 0}
                          onChange={(e) => update(u.no, { mastery: +e.target.value })}
                          className="w-full mt-2 h-1.5" style={{ accentColor: col }} />
                        {/* 状態・教材 */}
                        <div className="flex flex-wrap items-center gap-1.5 mt-2">
                          <select value={p.status} onChange={(e) => update(u.no, { status: e.target.value })}
                            className="bg-navy-700 rounded px-1.5 py-1 text-[11px] outline-none">
                            {HISTORY_STATUS.map((s) => <option key={s} value={s}>{s}</option>)}
                          </select>
                          {HISTORY_MATERIALS.map((mat) => {
                            const on = p.usedMaterials.includes(mat);
                            return (
                              <button key={mat} onClick={() => toggleMaterial(u.no, mat)}
                                className={'text-[11px] px-1.5 py-1 rounded border ' + (on ? 'bg-teal/20 border-teal/40 text-teal-100' : 'bg-navy-700 border-navy-500 text-slate-400')}>
                                {on ? '✓ ' : ''}{mat}
                              </button>
                            );
                          })}
                          {p.lastDate && <span className="text-[10px] text-slate-500 ml-auto">最終 {(() => { const d = parseYmd(p.lastDate); return `${d.m}/${d.d}`; })()}</span>}
                        </div>
                        <input value={p.note || ''} onChange={(e) => update(u.no, { note: e.target.value })} placeholder="メモ"
                          className="w-full mt-1.5 bg-navy-700/60 rounded px-2 py-1 text-[11px] outline-none" />
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* =========================================================================

function LogScreen({ data, setData, go }) {
  const [subjFilter, setSubjFilter] = useState('すべて');
  const [doneOnly, setDoneOnly] = useState(true);

  const entries = useMemo(() => allStudyEntries(data, doneOnly), [data, doneOnly]);
  const filtered = subjFilter === 'すべて' ? entries : entries.filter((e) => e.subject === subjFilter);

  // 日付ごとにまとめる（新しい順）
  const byDate = useMemo(() => {
    const m = {};
    filtered.forEach((e) => { (m[e.date] = m[e.date] || []).push(e); });
    return m;
  }, [filtered]);
  const dates = Object.keys(byDate).sort().reverse();

  const totalActualH = filtered.reduce((a, e) => a + e.actual, 0) / 60;

  const exportCsv = () => {
    const csv = entriesToCsv(filtered);

    <div className="max-w-2xl mx-auto px-3 pb-24">

  );

/* =========================================================================
 *  統計画面（Phase 5：統計グラフ）
 * ========================================================================= */
function StatsScreen({ data, setData, go }) {
  // 直近14日の学習時間（完了コマ分数→時間）
  const last14 = useMemo(() => {
    const arr = [];
    const t = parseYmd(todayYmd());
    for (let i = 13; i >= 0; i--) {
      const d = new Date(t.y, t.m - 1, t.d - i);
      const s = toYmd(d.getFullYear(), d.getMonth() + 1, d.getDate());
      arr.push({ s, dow: d.getDay(), day: d.getDate(), h: doneMinutes(logOf(data, s)) / 60, target: dayInfo(s).targetH });
    }
    return arr;
  }, [data]);
  const maxH = Math.max(10, ...last14.map((x) => Math.max(x.h, x.target)));

  // 今月の科目別割合
  const t = parseYmd(todayYmd());
  const monthAgg = useMemo(() => {
    const acc = { 英語: 0, 世界史: 0, 現代文: 0, 古文: 0, その他: 0 };
    Object.keys(data.dailyLogs || {}).forEach((s) => {
      const p = parseYmd(s);
      if (p.y === t.y && p.m === t.m) {
        (data.dailyLogs[s].slots || []).forEach((sl) => { acc[sl.subject] = (acc[sl.subject] || 0) + actualOf(sl); });
      }
    });
    const total = Object.values(acc).reduce((a, b) => a + b, 0) || 1;
    return { acc, total };
  }, [data]);

  // 累計・連続学習日数
  const cumulative = useMemo(() => {
    let total = 0;
    Object.keys(data.dailyLogs || {}).forEach((s) => { total += doneMinutes(logOf(data, s)); });
    // streak（今日からさかのぼって完了>0が続く日数）
    let streak = 0;
    const tt = parseYmd(todayYmd());
    for (let i = 0; i < 400; i++) {
      const d = new Date(tt.y, tt.m - 1, tt.d - i);
      const s = toYmd(d.getFullYear(), d.getMonth() + 1, d.getDate());
      if (doneMinutes(logOf(data, s)) > 0) streak++;
      else break;
    }
    return { totalH: total / 60, streak };
  }, [data]);

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="統計" data={data} setData={setData} />
      <NavTabs current="stats" go={go} />

      {/* 累計カード */}
      <div className="grid grid-cols-2 gap-2 my-3">
        <div className="bg-navy-700 rounded-xl p-3 text-center">
          <div className="text-xs text-slate-400">累計 学習時間</div>
          <div className="text-2xl font-black text-teal tabnum">{cumulative.totalH.toFixed(1)}<span className="text-sm">h</span></div>
        </div>
        <div className="bg-navy-700 rounded-xl p-3 text-center">
          <div className="text-xs text-slate-400">連続 学習日数</div>
          <div className="text-2xl font-black text-amber-400 tabnum">{cumulative.streak}<span className="text-sm">日 🔥</span></div>
        </div>
      </div>

      {/* 直近14日 棒グラフ */}
      <div className="bg-navy-700 rounded-xl p-3 mb-3">
        <div className="text-sm font-bold mb-2">直近14日の学習時間</div>
        <div className="flex gap-1">
          {/* Y軸目盛り（#F） */}
          <div className="flex flex-col justify-between h-36 text-[9px] text-slate-500 text-right pr-0.5 w-7 shrink-0">
            <span>{maxH}h</span>
            <span>{Number((maxH / 2).toFixed(1))}h</span>
            <span>0</span>
          </div>
          <div className="flex items-end gap-1 h-36 flex-1 border-l border-b border-navy-500/60 pl-1">
            {last14.map((x) => {
              const hgt = (x.h / maxH) * 100;
              const tgt = (x.target / maxH) * 100;
              const col = x.h >= x.target ? '#22c55e' : x.h > 0 ? '#2ec4b6' : '#39477d';
              return (
                <div key={x.s} className="flex-1 flex flex-col items-center justify-end h-full relative">
                  {/* 目標ライン */}
                  <div className="absolute left-0 right-0 border-t border-dashed border-slate-500/50" style={{ bottom: tgt + '%' }} />
                  <div className="w-full rounded-t relative" style={{ height: Math.max(hgt, 1) + '%', background: col }} title={x.h.toFixed(1) + 'h'} />
                  <span className={'text-[9px] mt-0.5 ' + (x.dow === 0 ? 'text-rose-300' : x.dow === 6 ? 'text-sky-300' : 'text-slate-400')}>{x.day}</span>
                </div>
              );
            })}
          </div>
        </div>
        <div className="text-[10px] text-slate-500 mt-1">— 破線は各日の目標時間</div>
      </div>

      {/* 今月の科目別割合 */}
      <div className="bg-navy-700 rounded-xl p-3">
        <div className="text-sm font-bold mb-2">今月（{t.m}月）の科目別割合</div>
        {monthAgg.total <= 1 && <p className="text-xs text-slate-500">今月の学習記録はまだありません。</p>}
        {/* 積み上げバー */}
        {monthAgg.total > 1 && (
          <>
            <div className="flex h-4 rounded-full overflow-hidden mb-2">
              {SUBJECTS.map((sub) => {
                const v = monthAgg.acc[sub] || 0;
                if (!v) return null;
                return <div key={sub} style={{ width: (v / monthAgg.total) * 100 + '%', background: SUBJECT_STYLE[sub].dot }} title={sub} />;
              })}
            </div>
            <div className="space-y-1">
              {SUBJECTS.map((sub) => {
                const v = (monthAgg.acc[sub] || 0) / 60;
                if (!v) return null;
                return (
                  <div key={sub} className="flex items-center gap-2 text-xs">
                    <span className="w-12 flex items-center gap-1"><SubjectDot subject={sub} />{sub}</span>
                    <span className="tabnum text-slate-300">{v.toFixed(1)}h</span>
                    <span className="tabnum text-slate-500">（{Math.round((monthAgg.acc[sub] / monthAgg.total) * 100)}%）</span>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* =========================================================================
 *  設定画面（Phase 5：セットメニュー編集・基本設定）
 * ========================================================================= */
function SettingsScreen({ data, setData, go }) {
  const setMenus = data.setMenus || {};
  const names = Object.keys(setMenus);
  const [openSet, setOpenSet] = useState(null);
  const [renameVal, setRenameVal] = useState('');
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState('');
  const [confirmDel, setConfirmDel] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [setupOpen, setSetupOpen] = useState(false);
  const [syncMsg, setSyncMsg] = useState('');

  const settings = data.settings || {};
  const setSetting = (k, v) => setData((prev) => ({ ...prev, settings: { ...prev.settings, [k]: v } }));
  const doManualSync = () => {
    if (!settings.sheetUrl) { setSyncMsg('先にURLを入力してください'); return; }
    setSyncMsg('送信中…');
    syncToSheet(data)
      .then(() => { setSetting('lastSync', Date.now()); setSyncMsg('送信しました。スプレッドシートをご確認ください。'); })
      .catch(() => { setSyncMsg('送信に失敗しました。URLとデプロイ設定（全員アクセス可）をご確認ください。'); });
  };
  const copyScript = () => {
    if (navigator.clipboard) navigator.clipboard.writeText(APPS_SCRIPT_CODE).then(() => setSyncMsg('スクリプトをコピーしました')).catch(() => {});
  };

  const updateSet = (name, arr) => setData((prev) => ({ ...prev, setMenus: { ...prev.setMenus, [name]: arr } }));
  const addSlot = (name) => updateSet(name, [...(setMenus[name] || []), { subject: '英語', menu: MENU_MASTER['英語'][0].name }]);
  const removeSlot = (name, i) => updateSet(name, setMenus[name].filter((_, idx) => idx !== i));
  const editSlot = (name, i, patch) => updateSet(name, setMenus[name].map((x, idx) => (idx === i ? { ...x, ...patch } : x)));

  const toggleOpen = (name) => { if (openSet === name) { setOpenSet(null); } else { setOpenSet(name); setRenameVal(name); setConfirmDel(null); } };
  // 新規追加（インライン・#E）
  const commitAdd = () => {
    const n = newName.trim();
    if (!n || setMenus[n]) { setAdding(false); setNewName(''); return; }
    setData((prev) => ({ ...prev, setMenus: { ...prev.setMenus, [n]: [] } }));
    setAdding(false); setNewName(''); setOpenSet(n); setRenameVal(n);
  };
  // リネーム（インライン・順序を保持 #C）
  const commitRename = (old) => {
    const nw = (renameVal || '').trim();
    if (!nw || nw === old) { setRenameVal(old); return; }
    if (setMenus[nw]) { setRenameVal(old); return; } // 重複は無視
    setData((prev) => ({ ...prev, setMenus: Object.fromEntries(Object.entries(prev.setMenus).map(([k, v]) => [k === old ? nw : k, v])) }));
    setOpenSet(nw);
  };
  const deleteSet = (name) => {
    setData((prev) => { const c = { ...prev.setMenus }; delete c[name]; return { ...prev, setMenus: c }; });
    setConfirmDel(null); if (openSet === name) setOpenSet(null);
  };
  const resetSets = () => { setData((prev) => ({ ...prev, setMenus: cloneSetMenus() })); setConfirmReset(false); setOpenSet(null); };
  const clearAll = () => { localStorage.removeItem(STORAGE_KEY); setData(seedData()); go('#/'); };

  return (
    <div className="max-w-2xl mx-auto px-3 pb-24">
      <Header title="設定" data={data} setData={setData} />
      <NavTabs current="settings" go={go} />

      <div className="flex items-center justify-between mt-4 mb-1 px-1">
        <span className="text-xs font-bold text-teal">🍱 セットメニュー編集</span>
        <div className="flex gap-2">
          <button onClick={() => { setAdding((v) => !v); setNewName(''); }} className="text-xs px-2 py-1 rounded bg-teal text-navy font-bold">＋新規</button>
          {confirmReset
            ? (<span className="flex gap-1">
                <button onClick={resetSets} className="text-xs px-2 py-1 rounded bg-rose-500/30 text-rose-100">初期化する</button>
                <button onClick={() => setConfirmReset(false)} className="text-xs px-2 py-1 rounded bg-navy-600 text-slate-300">やめる</button>
              </span>)
            : <button onClick={() => setConfirmReset(true)} className="text-xs px-2 py-1 rounded bg-navy-600 text-slate-300">初期化</button>}
        </div>
      </div>

      {/* インライン新規追加フォーム（#E） */}
      {adding && (
        <div className="flex gap-2 mb-2">
          <input autoFocus value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && commitAdd()}
            placeholder="セットメニュー名（例：模試前日）" className="flex-1 bg-navy-600 rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-teal" />
          <button onClick={commitAdd} className="bg-teal text-navy font-bold px-4 rounded-lg text-sm active:bg-teal-600">追加</button>
        </div>
      )}

      <div className="space-y-2">
        {names.map((name) => {
          const isOpen = openSet === name;
          const set = setMenus[name] || [];
          return (
            <div key={name} className="rounded-xl bg-navy-700 overflow-hidden">
              <button onClick={() => toggleOpen(name)}
                className="w-full flex items-center gap-2 px-3 py-2.5 text-left active:bg-navy-600">
                <span className="text-xs text-slate-400" style={{ transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▶</span>
                <span className="flex-1 text-sm font-medium">{name}</span>
                <span className="text-xs text-slate-400">{set.length}コマ</span>
              </button>
              {isOpen && (
                <div className="px-2 pb-2 space-y-1.5">
                  {/* セット名リネーム（#C） */}
                  <div className="flex items-center gap-2 px-1 pt-1">
                    <span className="text-[10px] text-slate-500">名前</span>
                    <input value={renameVal} onChange={(e) => setRenameVal(e.target.value)} onBlur={() => commitRename(name)}
                      onKeyDown={(e) => e.key === 'Enter' && e.target.blur()}
                      className="flex-1 bg-navy-600 rounded px-2 py-1 text-sm outline-none focus:ring-1 focus:ring-teal" />
                  </div>
                  <DragList items={set} className="space-y-1.5" onReorder={(arr) => updateSet(name, arr)}
                    render={(x, i, grip, dragging) => {
                    const menus = MENU_MASTER[x.subject] || [];
                    return (
                      <div className={'flex items-center gap-1.5 bg-navy-600 rounded-lg p-2' + (dragging ? ' ring-2 ring-teal opacity-80' : '')}>
                        <div {...grip} className="text-slate-500 px-1 select-none text-base" aria-label="並べ替え">≡</div>
                        <select value={x.subject}
                          onChange={(e) => { const sub = e.target.value; const first = (MENU_MASTER[sub][0] || {}).name || ''; editSlot(name, i, { subject: sub, menu: first }); }}
                          className="bg-navy-700 rounded px-1.5 py-1.5 text-[11px] outline-none">
                          {SUBJECTS.map((s) => <option key={s} value={s}>{s}</option>)}
                        </select>
                        {x.subject === 'その他' ? (
                          <input value={x.menu} onChange={(e) => editSlot(name, i, { menu: e.target.value })}
                            className="flex-1 bg-navy-700 rounded px-1.5 py-1.5 text-[11px] outline-none" />
                        ) : (
                          <select value={x.menu} onChange={(e) => editSlot(name, i, { menu: e.target.value })}
                            className="flex-1 bg-navy-700 rounded px-1.5 py-1.5 text-[11px] outline-none">
                            {!menus.find((mm) => mm.name === x.menu) && <option value={x.menu}>{x.menu}</option>}
                            {menus.map((mm) => <option key={mm.name} value={mm.name}>{mm.name}</option>)}
                          </select>
                        )}
                        <button onClick={() => removeSlot(name, i)} className="w-8 h-8 flex items-center justify-center text-rose-300 active:bg-rose-500/20 rounded" aria-label="削除">✕</button>
                      </div>
                    );
                  }} />
                  <div className="flex gap-2">
                    <button onClick={() => addSlot(name)} className="flex-1 py-1.5 rounded-lg border border-dashed border-navy-500 text-slate-300 text-xs active:bg-navy-600">＋ コマ追加</button>
                    {confirmDel === name
                      ? (<>
                          <button onClick={() => deleteSet(name)} className="px-3 py-1.5 rounded-lg bg-rose-500/40 text-rose-100 text-xs">本当に削除</button>
                          <button onClick={() => setConfirmDel(null)} className="px-3 py-1.5 rounded-lg bg-navy-600 text-slate-300 text-xs">やめる</button>
                        </>)
                      : <button onClick={() => setConfirmDel(name)} className="px-3 py-1.5 rounded-lg bg-rose-500/20 text-rose-200 text-xs">セット削除</button>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Googleスプレッドシート連携 */}
      <div className="text-xs font-bold text-teal mt-5 mb-1 px-1">📊 Googleスプレッドシート連携</div>
      <div className="bg-navy-700 rounded-xl p-3 space-y-2">
        <p className="text-[11px] text-slate-400 leading-snug">完了した学習記録を自動でスプレッドシートに反映します（過去分もすべて蓄積）。初回だけ下の「設定方法」で連携URLを作成してください。</p>
        <div>
          <label className="text-[11px] text-slate-400">連携URL（Apps Script のウェブアプリURL）</label>
          <input value={settings.sheetUrl || ''} onChange={(e) => setSetting('sheetUrl', e.target.value.trim())}
            placeholder="https://script.google.com/macros/s/.../exec"
            className="w-full mt-0.5 bg-navy-600 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1 focus:ring-teal" />
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <label className="flex items-center gap-1.5 text-xs text-slate-300 cursor-pointer select-none">
            <input type="checkbox" checked={settings.autoSync !== false} onChange={(e) => setSetting('autoSync', e.target.checked)} className="w-3.5 h-3.5 accent-teal" />
            記録が変わったら自動で送信
          </label>
          <button onClick={doManualSync} className="text-xs px-3 py-1.5 rounded-lg bg-teal text-navy font-bold active:bg-teal-600">🔄 今すぐ全部同期</button>
          {settings.lastSync && <span className="text-[10px] text-slate-500">最終同期 {(() => { const d = new Date(settings.lastSync); return `${d.getMonth() + 1}/${d.getDate()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`; })()}</span>}
        </div>
        {syncMsg && <p className="text-[11px] text-teal-200">{syncMsg}</p>}

        <button onClick={() => setSetupOpen((v) => !v)} className="text-xs text-slate-300 underline">設定方法（初回だけ）{setupOpen ? '▲' : '▼'}</button>
        {setupOpen && (
          <div className="text-[11px] text-slate-300 space-y-1.5 bg-navy-600 rounded-lg p-2.5">
            <ol className="list-decimal pl-4 space-y-1">
              <li>Googleで新しいスプレッドシートを作成。</li>
              <li>メニュー「拡張機能 → Apps Script」を開く。</li>
              <li>表示されたコードを全部消し、下のコードを貼り付けて保存。</li>
              <li>右上「デプロイ → 新しいデプロイ」→種類「ウェブアプリ」。</li>
              <li>「アクセスできるユーザー」を<b>全員</b>にしてデプロイ。</li>
              <li>表示された<b>ウェブアプリのURL</b>（末尾 /exec）を上の欄に貼り付け。</li>
              <li>「🔄 今すぐ全部同期」を押す → シートに「学習ログ」タブができれば成功。</li>
            </ol>
            <div className="flex items-center justify-between">
              <span className="text-[10px] text-slate-400">↓ コピーして Apps Script に貼り付け</span>
              <button onClick={copyScript} className="text-[10px] px-2 py-0.5 rounded bg-teal text-navy font-bold">コピー</button>
            </div>
            <textarea readOnly value={APPS_SCRIPT_CODE} onFocus={(e) => e.target.select()}
              className="w-full h-40 bg-navy-700 rounded p-2 text-[10px] font-mono outline-none" />
            <p className="text-[10px] text-slate-400 leading-snug">※ シートは常に最新状態に上書きされます（アプリ内の全履歴の写し）。Excelで見たいときはスプレッドシートを「ファイル→ダウンロード→.xlsx」で保存できます。</p>
          </div>
        )}
      </div>

      {/* データ管理 */}
      <div className="text-xs font-bold text-teal mt-5 mb-1 px-1">💾 データ管理</div>
      <div className="bg-navy-700 rounded-xl p-3 text-sm text-slate-300 space-y-2">
        <p className="text-xs text-slate-400">バックアップは画面右上の「⬇ / ⬆」から行えます（JSON）。</p>
        {confirmClear
          ? (<div className="flex gap-2 items-center">
              <span className="text-xs text-rose-200">全データを消して初期化します。よろしいですか？</span>
              <button onClick={clearAll} className="text-xs px-3 py-1.5 rounded-lg bg-rose-500/40 text-rose-100">実行</button>
              <button onClick={() => setConfirmClear(false)} className="text-xs px-3 py-1.5 rounded-lg bg-navy-600 text-slate-300">やめる</button>
            </div>)
          : <button onClick={() => setConfirmClear(true)} className="text-xs px-3 py-1.5 rounded-lg bg-rose-500/20 text-rose-200">全データを初期化</button>}
      </div>
    </div>
  );
}

/* =========================================================================
 *  ルーティング & App
 * ========================================================================= */
function useHash() {
  const [h, setH] = useState(location.hash || '#/');
  useEffect(() => {
    const f = () => setH(location.hash || '#/');
    window.addEventListener('hashchange', f);
    return () => window.removeEventListener('hashchange', f);
  }, []);
  return h;
}

function App() {
  const [data, setData] = useState(loadData);
  const hash = useHash();
  const syncTimer = useRef(null);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  }, [data]);

  // スプレッドシート自動同期（記録が変わったら4秒後にまとめて送信・デバウンス）
  useEffect(() => {
    const url = data.settings && data.settings.sheetUrl;
    if (!url || data.settings.autoSync === false) return;
    if (syncTimer.current) clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => { syncToSheet(data).catch(() => {}); }, 4000);
    return () => { if (syncTimer.current) clearTimeout(syncTimer.current); };
  }, [data.dailyLogs]);

  const go = (path) => { location.hash = path; window.scrollTo(0, 0); };

  // #/day/YYYYMMDD
  const dayMatch = hash.match(/^#\/day\/(\d{8})/);
  if (dayMatch) {
    return <DayScreen data={data} setData={setData} date={dayMatch[1]} go={go} />;
  }
  if (hash.startsWith('#/history')) {
    return <HistoryScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/english')) {
    return <EnglishScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/weekly')) {
    return <WeeklyScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/goals')) {
    return <GoalsScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/stats')) {
    return <StatsScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/log')) {
    return <LogScreen data={data} setData={setData} go={go} />;
  }
  if (hash.startsWith('#/settings')) {
    return <SettingsScreen data={data} setData={setData} go={go} />;
  }
  return <CalendarScreen data={data} setData={setData} go={go} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
